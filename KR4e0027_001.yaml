body:
  text: 王常宗集卷一明王彛撰碑銘蘇州重修孔子廟學碑蒲圻魏公守姑蘇之明年鋤暴樹良無令弗肅上下洽和百廢具興惟孔子廟學弗治棟楹傾欹丹堊翳昧若不支旦暮者公顧瞻良久愀然弗寧乃登僚宰縣令丞暨尚義之士咸集乎庭喟然嘆曰皇帝以神武定四海即大興文治詔以明經六藝之科頒示郡邑使選弟子貟講肄眀體適用之學將以人文化成天下今弊陋至是非所以靈承帝意余先捐俸為倡爾二三君子幸相與圖之穹殿邃廊䖍恭奉明禋靈星門神道㕔繇其役為最殷吳江葛德潤爾其葺之倫堂有嚴兩廡相向挾以六齊以通于前門吳江寧璇汝其修之亭號采芹下臨康衢來遊來歌多士攸宜崑山張庸爾其整之公言未已吳江令許茂進曰邑有八士曰李庚曰曹德曰沈璇曰姚蒙曰莫禮曰陳景曰朱士能曰葛彥祥頗有意乎詩書尊經之閣先賢諸祠遊息三亭以至庖湢橋梁之屬茂率其承之長洲丞丁師尹復進曰許令然矣師尹獨不為乎若止善堂及中廊逹于閣者當諭羣闕各賦金俾里耆唐晟視其役焉公大恱惟周垣四千八百尺未有所屬僚若佐遂以罰布傾助而吳縣長二歡然趨功役邑夫畚簸土繩繩而來事因大集始事于洪武六年二月戊辰而訖功十一月如翬斯飛如雲斯凝如濤斯湧深沈而潔清宏麗而靚密一還承平舊觀公率其屬執豆籩具餔醢以成功告觀者如堵墻莫不嗟嘆自兵興以來學宫所在蹂踐為墟而姑蘇幸僅存非公之至幾何不與之俱廢乎教授貢穎之既宣力于始終復使訓導張由請記其事以埀不朽惟蘇之有學實始於范文正公蓋公景祐初出守鄉郡擇南園之地奏請於朝而建是學為其師者則安定胡文昭公也計當時人物固嘗盛矣數百載之下仰其聲光慕其風烈每使人發不可企及之歎自時厥後雖守有賢愚而學之興廢靡常而二公過化之地流風遺俗終未泯也况今遭逢有道之朝而得良二千石為之師帥豈徒然哉然公興學之志不下于范公者也則夫坐臯比而談經藝者其必將文昭乎明體適用之學者知駸駸而盛矣茍不務出此而摘英搴華為譁世職寵之具非區區所敢聞請以是刻諸麗牲之碑庶幾蘇之人士知所自朂哉公名觀字杞山通周易為人洞達無凝滯如八窗玲瓏見義而獨為雖千萬人不可遏所至輒烈烈有聲同知府事李權通判徐弼推官趙霖經歷李亨知事王德源照磨吳佐皆號一時之選與公道合故成事無難者其吳縣長二則曽黼杜德昌丁彬督其役夫而責其成者又閭師滕德進與黃文貴劉立陳茂金源黃廷玉也碑為修學作前代興造各自有記皆不書唯當書者不敢拘以文體而不疏其詳焉系之以詩曰姑胥之墟有川滮滮折趨南園匯而東流靈氛中啓煥爛弗收自非聖師疇叶其休惟昔哲人出綰郡章乃構學宫乃建廟堂廟堂章章學宫將將拾佩洋洋來翺來翔盛衰相仍揆理則然風摧雨蝕上漏榮穿矧丁艱虞烽火相連誰一舉臂持危扶顛大明當天九服攸同叶攙搶斂翳奎璧吐芒眷我魏公來蒞大邦屢形于言我敢怠遑既率郡封復登僚佐分勞授事具乃教條曽不一期厥功孔昭化此朽腐鬱為岧嶤孰敦化原孰築教基孰牖民彛匪孝曷為我語蘇人公豈爾私耳目茍具必致其思思之如何法孝與忠二者無愧行將天通震澤有石其堅比同史官勒辭用昭無窮鄉飲酒碑銘皇明既一四海乃大興禮樂以新令俗還古道為千萬世計惟鄉飲酒繇近代以還蔑之有講洪武五年始詔郡國以孟春孟冬舉行斯禮而讀律焉其時江夏魏公實守蘇州奉詔惟謹既一再行之然尚恐未能宣上德意是以明年復參考儀禮以授經歷李亨教授貢頴之使與郡士周南老王行徐用誠共商校之且使張端及諸生相與習焉爰舍菜先聖先師以孟冬之月吉日癸未行于郡學其大賓為前進士魏俊民介為先聖五十四世孫思賙僎為推官王芳三賓為范廷徴衆賓為邵允禮錢瓊等十有一人次僎為知吳縣事曽黼知長洲縣事張其而樂正以張由司平以滕權賢而得其人如此又特位主老人曰崑山周夀誼年百有十嵗曰吳縣楊茂九十有三嵗曰林文友九十有二嵗皆形充神完行坐有禮老人而得其人又如此然後皆列坐八十以上者十有三人七十以上者六十有二人六十以上者四十有七人五十立而聽政役者百人凡在位者之子弟侍立者二十有八人主賓僎介之贊相爵尊豆籩俎洗之執事者皆具又别為教授位而吳縣教諭徐鼎崑山教諭陳圭次之訓導十五人又次之長洲教諭周敏則以侍其父南老常熟教諭傅其侍其父玉皆降西北面立合鄉學及六縣弟子貟之立者百有六十人文武僚佐之在位觀禮者若干人農工商賈逺近之觀者又以千計公年且七十而朱顔煥如獨出人表升降揖拜竟日無惓而其子子槃侍立進趨中度于是化明樂和衆以大恱既而乃讀律衆復肅以聽皆曰今天子神聖援吾人水火中而斯禮也吾身親見之幸哉越五日周老人還崑山公躬出婁門之郊再拜以餞都之士女觀者又慨焉以為幸見且曰公于人之父兄也如父兄然吾于吾父兄宜何如君子以是知公之政與孝與弟者蓋易易然也且老人者生宋景定中歷元百年而遭逢聖代意者天生斯老以待今仁夀固已在百年先矣微公誰能表之彛也居公之野矣病廢得扶曳以觀焉蓋曠世之遭也故為銘其堂下碑曰于維皇王正此方夏爰釋戎衣有事郊社祀享㑹朝禮作樂造叶神人既和及鄉飲酒維鄉飲酒萬方攸同俾孝與弟載臻時雍顯顯魏公牧我蘇人公有旨酒樂我嘉賓嘉賓戾止以僎以介公在泮宫賓至則拜出祖東壁羞自東房𤣥酒于尊房户是當有勺有勺實彼爵矣再拜稽首獻且酢矣吹笙鼓琴而瑟而簫叶而間以歌厥音猶猶有黃其髮鮐背兒齒百有十歲眉夀曷已公拜而饋實猶父兄叶何以將之篚有𤣥黃賓既樂只言旋言歸醉飽自公祝公期頥我子我孫公之孫子公我父兄我孝我弟公曰咈哉天子明聖天子萬年畜爾子姓猗嗟蘇人今復爾古我作歌詩以告來世記蘇州府孔子廟南門記孔子不有其位而其道使萬世帝王因之而不革蓋孔子者帝王百世者也故自唐王祀孔子而孔子廟擬諸王者歷世弗以為泰今天子大祀典禮凡海嶽百神之追尊帝王者皆復古號唯于孔子之道謂非有功一方一時者然而大成至聖文宣巍然獨建使百神無與為並蓋雖有所仍而尊之之意乃有加焉然近世郡縣之學恆與廟混殊不知古者有學無廟而其學天子辟雍諸侯頖宫焉爾今郡縣有孔廟夫既擬諸王者顧乃以學附焉殆非古頖宫之制頖宫以為學而廟則寓焉又非今之所謂王祀孔子者惟蘇州學左復别有廟則以擬王者而靈星門南不十數步即畫于鄰垣于是曲而之東以趨通衢而鬱塞翳昧與南面向明而王道之無偏焉者大弗稱始唐大歷中李栖筠刺是州嘗增學廬至宋郡城東南復有故夫子廟景祐初范文正公嘆其隘陋始遷于錢氏南園之巽隅而公之子恭獻公復加闢焉今廟學是也夫其肇基之髙且廣若此顧獨有所弗稱者蓋鄰垣一方其地廣袤凡若干畞故亦為錢氏園由宋及元屢易業主而卒歸于寧氏先後之守臣無慮百數十人豈無欲拓其地而南焉者然皆不可以力得也至正間守臣六十間以學廩之羡貿其地于寧氏之孫開得三之一而亦不能以利盡得也入國朝來蘇為畿內大郡地闊物夥守臣之選難其人洪武五年國子祭酒江夏魏公以正學碩德出守兹土政修令行人敬以愛明年又修廟學而宏博壯麗實踰舊貫未幾而開盡以其地所存三之二歸焉公曰是有待也而在余哉因命教授宣城貢頴之繪圖而經營之而郡人士皆願出私錢以助乃通道自靈星門以極于南城之隂而故有洗馬池適當其前又有狀元晝錦兩坊適拱其左右于是來文廟之道于洗馬池南而架梁以入其道南北之半故又有假山山之隂有池曰來秀其水自太湖來入南城之池宛焉以注來秀自來秀南流則滙之洗馬而止其北流則歸之學之頖池而止于是又即來秀池南闢假山遺址而為之外門焉至是而廟也學也出入之道殊矣故入其門則循池之東以趨于廟出其門則折而西又折而北為渠渠上者再以達泮池之梁而趨於學于以示神人之不可褻也如此廟學之告成也翰林侍講學士太子贊善金華宋公濓既為之記而頴之以為此一區孔子南面之地也范公所未得為者也今魏公乃得為之蓋始終幾三百年而廟學大備有不可不特書者爰以狀使彛記之彛也多病學日荒落曷以書公之績然辭之而弗獲也乃記之曰洪武六年十月某日新作孔子廟南門十一月某日孔子廟南門成或曰春秋之新作南門特書也此其例歟曰春秋之作舉一世而復之正以其書法而書不正者焉斯美辭也孔子王號國家既特存之則作門也而擬諸王者焉禮也公得以欽承天子之詔焉敬也故曰吾之書美辭也噫此所以為公之績也歟此公之績所以特書之而有取于春秋之法也歟公者其字杞山武昌之蒲圻人世之學者皆稱之蒲圻先生云順理齊記吳郡自昔衣冠之所萃入國朝其郡人若宋節幹顔公若湯師言龔子敬兩先生及禮部于公其寓止若所南鄭先生若虞文靖公黃文獻公太常栁公皆卓然師表一世故其學者知務經術為文章必要諸理其後湘東李一初先生亦寓于是學者又出其門焉尹君伯章吳人者蓋嘗接聞諸君子之流風而又及親炙黃公且嘗與李先生遊其所學概可知矣君他日語彛曰吾章名而伯章字也且順理成章曰文吾故以順理名吾所居之齊而李先生嘗為之記噫兵燹之餘記已云亡而先生不可以復起矣子知先生者碩續為記彛以愚且魯不敢當者久之而終不敢以拂君之意也乃記之曰理出于一本始而流行于天地人三才故日月星辰之經緯與夫江河之流山嶽之峙及夫父子之親君臣賓主少長之事衣服飲食宫室之物皆三才自然之文也有聖人者出于是為之璣衡歷數以文其天之文為之疆界井田以文其地之文為之綱紀人倫制作禮樂以文其人之文而聖人亦何嘗任其私智而强為之哉亦惟順其理而已矣今其說具于六經君子講習于兹而有得于父師者宜亦審矣茍即其自然者以循而行之端自我爾又何假于余之空言也歟且是齊也君實居之其學者又從君而學之夫既曰順理矣固宜相與講習於兹而有所自得者又非余之所能言也余所以必為之記以書君于古之先逹君子之後者俾來者知君之學之有自也祕藥巢記祕藥巢在吳郡干將坊之東者南陽韓君名奕字公望自其先以醫傳術著子母至宋靖康中隨駕渡南遂徙居吳至君若干傳而君之術益精君生年今三十又四目眚且十餘年惟淡泊雅不喜走馬跡車塵間人往往迎君以視疾其家者無虛日君百謝而不出且曰我目廢久負不宜出者三吾自分永棄不欲聞斯世事故不欲醫行人間一不宜出醫之術視人疾望為之先而吾目廢矣二不宜出吾目既廢而吾心猶有不存端居以㴠養吾職也三不宜出又曰吾負三不宜出然祖宗之術不可絶也養祭之道不可荒也吾惟藉吾藥以自謀而已乃涓室干將坊之東以其所授受湖江間祕方大人小子婦女與瘍醫諸科製善藥而廣列焉日獨埀簾坐户內人抱疾來者輒訊而與之人以得君之藥為榮君之室僅尋尺許百藥莫充棟宇縷縷如鳩巢然君謂其友蜀郡王彛曰吾之室吾以為巢焉吾野人也宜巢巢野人居也雖然以野人而居野人之居然而在市之中吾懼夫市之人以為吾疑也吾曰君固欲以古道而淑夫市之人緇冠深衣不服今服非古轍弗履非古書弗讀巋然為鄒魯儒者吾方擬君若三代之民今居曰巢且居是祕藥于其間是又欲神農氏所味以療夫鼎俎酣豢之徒以有巢所居而易夫雕墻峻宇之俗也吾將賀夫市之人之日趨于古也君欲名其室曰祕藥巢而彛為之記云西野堂記陽羡之山東涵震澤北瞰大江而天目諸峯又皆奔趨于其南獨西野一方湮之皆曠野居人自昔成聚有都曰臧林者儲氏世居之儲氏有曰惟賢字希聖仲曰惟德字希崇以春秋學自相師友先後為鄉貢進士鄉人相與師之以其居陽羡西野而西野之人才且賢者莫或為儲氏先也皆指而相語曰是西野儲氏也于是儲氏之于西野雖不敢以専美其一鄉然西野以儲氏而聞于當時則鄉之人有不得不以為儲氏專美矣故又曰其所居堂曰西野之堂云今年春希崇領鄉薦為郡學教授來上京師而余與希崇遇余在昔固嘗識儲氏昆弟又聞有所謂西野堂者至是問余為之記焉夫自天下大亂凡城闕之號稱名都者其綺羅金碧歌舞之地一旦乃鞠為烟草有過之者類皆躑躅於狐蹤兔跡之餘雖欲倣佛昔逰以求其孰為東歟孰為西歟而不可謀也然而四方之仕與商者茍其舟車之出于陽羡焉有矯首而西望者則惟見夫夕陽暗曖之地油油然􅀢􅀢然皆桑柘麻麥也而鳴雞吠犬方相聞于炊烟之間歸農倦樵且休息於灌木之下以儲氏西野之堂在乎是也夫豈人力之所能致哉抑天以是而私希崇使希崇優遊于干戈之間以大肆其力于春秋也若徒樂夫岩栖谷飲以終身斯堂而已者此畸人狷士之所為也希崇豈其然歟瞻松亭記范文正公之故宅在吳城中今為文正書院公手植松二猶存也公之十世孫天章居書院旁構亭以瞻二松因名其亭曰瞻松云天章數徴彛文以為記彛辭之而弗獲也乃退而思之夫松也物于物者也而天章瞻焉殆將托是以思其先公也歟彛竊嘗讀公遺書而觀公平生之概焉公之參大政帥西陲也實為宋皋䕫吕召當時之人以擬公斯四臣者而天下後世信之無異辭故雖野夫市人咸能道公姓名有不及見公之嘆而公也不可作矣嗚呼公生當時與今之人匪同世而今之人也小人歟愧之君子歟慕之由公而至今幾四百年矣幾四百年如並時而同世者吾固知公之平生于萬世一日也而况于公之子孫乎固宜乎其瞻公之松也今夫松之有明堂總章之材也而公似之有旁敷丕覆暍者所仰焉以息之䕃也而公似之有繁霜苦雪特立弗摧之撡也而公似之則公之所以振厲夫千萬世者在是矣天章之瞻之也果出此也則夫其一舉目之間洋洋乎而來者固皆公之平生而天下後世所當法也豈徒然哉然公之平生則無一而不可為天下後世法者而其躍然于天下後世之人心者無時而不然也顧何待于耳目之間蓋不期于斯松之瞻而自不能不瞻矣則凡其見于耳目之間皆是松若也是則天章之瞻松非瞻松也蓋所以瞻公而孜孜孝焉以求無愧乎為公之子孫不然松何地無哉石澗書堂記吳多佳山水然郡郭中無長林大麓其地平衍為萬屋所鱗聚而車驅馬馳之聲相聞乃有即其一區之隙而居焉者若采蓮里之俞氏園而已俞氏其先汴人宋靖康中有以避地來者愛洞庭七十二峯於吳之山為最秀因卜築于林屋之甪里其後有徒居兹園者在嘉禧淳祐間號為巨室中罹變故雖屢易地主而其曰俞氏園者則自若也至正壬辰有伯溫者始復其故地二畞餘築而為屋四楹中祠其先君子石澗先生像而左庋先生所述易㑹要百有四十卷集說三十六卷右庋所注隂符經參同契若干卷先生之門人王清獻公都中為大書其楣曰石澗書堂云始先生生宋季年以經義有聲場屋間以科第起家而吳內附山林之士往往謳歌而興以為一日之用先生乃惟家居讀易而玩象觀理著書以自見彛嘗升堂拜先生遺像則見夫深衣大帶拱焉以立如所謂三代之民者於是益有慕乎先生而有後時之歎然猶幸先生之書猶存也且俞氏自渡江來幾及二百年諸書之傳非一世矣而仕皆不大顯至先生學髙道𢡟猶以約終其身意必有鬱于前而發于後者而伯溫顧亦潜德以老然子立焉是能力學以發揮其先大父者夫易之道貞則復元先生貞矣立其復元者哉先生諱琰字玉吾伯溫字子育立字有立抱𤣥齊記老子言𤣥以明天人至妙之理而其所以自處者常超然出乎萬物之表而辱與榮咸不與焉是可謂優于𤣥者矣揚子雲即其緒餘擬易作太𤣥經而乃委身于新莽以為後來所誚是不惟不知𤣥且不知老矣蓋老子清虛無欲之士代之隱者宗焉子雲以新莽氏獨惜乎其不隱也句吳有隱者曰吳伯善甫善製墨因名其所居齊曰抱𤣥蓋以𤣥在萬物中物皆有之墨其一物耳乃獨純乎其色備乎其道故抱焉以自處以為君子之所需也而君則自為有足為人道重者君在昔至正丙申淮兵入吳君之兄病廢者十五六年至是家人悉散去而君獨侍其側兵踰垣刺君君脫之乃負兄以出甫及門復有兵數十輩交刺君至三十餘鎗君仆且死兄亦死久而君復蘇者天誘其衷以旌其義者蓋君于是時知有兄耳死與生不暇計也故其大義伸倉卒中有足為人道重如此今而退然不為世用顧乃隱居西郊製墨以自食其力且將終其身焉固若有取于老子所謂知白守黑云者而其向之與兄同死者至今猶凜然也其視夫子雲以𤣥自說義不義何其逺哉吾故曰君非徒隱者也義士也抑吾聞之君賣墨吳市中不二價自學士大夫至于童丱小子皆知君姓名凡書字必以君墨然今大山長谷之間豈無有大儒先生藝春秋筆書莽大夫者其所試墨如欲出於義士之手則必訪君而求之庶不汚其直筆云映雪軒記泉之為州接三吳而連二廣其地恆燠纍嵗未嘗見雪一孫惟善者州人也而遊于吳嘗築室婁江之上為小軒讀書其間再經大寒而再見雪惟善方展卷夜誦且有以滌神㵕慮而忘客千里外也其鄰友晋昌唐本初沛國朱孟東漢中趙用晦勇聞兄弟是夕過焉以為在昔孫康氏嘗讀書映雪而惟善同姓也今又若是故題其軒曰映雪而請余為文以記之余前年客吳城之鶴市市南隙地數十畞一望皆青草故自春至冬惟一色余是夜卧館內有颯爾響窗牖若萬松子相騰擲聲而余之室煜然以輝乃啓户視之大雪且滿目野鸖數十自相和鳴寒風復颼飂起而余之神欲飛以去因出戶外行空闊間一再匝俯仰四顧若有以見天地之全而余之心有廓然焉者意是夕即惟善讀書時也獨惜余不得與惟善鄰相往返以相語也然是軒所見且聞者當不異是而其心廓然焉者亦不異是也惟善他日必歸其鄉以是而語其鄉之人必相與大息而曰是夕也吾未之見也于此凝而思之其必有廓然乎其心者哉是為記菊鄰記凡天下之物莫不有鄰日與月為鄰江與海為鄰河與淮濟為鄰泰山與嵩華為鄰麟鳯自相為鄰而龍與雲為鄰其于人也亦必有鄰而鄰非止于比屋而已也故孔子與七十子鄰蓋嘗曰德不孤必有鄰若堯舜之為君也與其臣皋䕫稷契之徒為鄰故曰臣哉鄰哉然而有髙世而無鄰者則天子所不臣諸侯所不友若伯夷叔齊與凡隱逸者是已今而草木之華皆發于春菊有黃花視諸草木不華而獨花此所以為花之隱逸者而不與他草木鄰乃求夫人之隱逸若陶公者鄰也吳人王本中氏攻詩以醫隱性好蒔菊謂其善制頽齡特有資于醫也人有過其所居者見四鄰皆菊曰王氏以菊為鄰也或曰不然菊以王氏為鄰蓋王氏非膠然曰菊吾之鄰而菊自不能不與王氏鄰也暨陽王先生原吉為題其所居曰菊鄰是固以為菊碩與王氏鄰而王氏真菊之鄰也雖然菊花之隱逸而王氏之隱逸則其性一也王氏欲與菊為乎菊欲與王氏鄰乎必有能辨之者新陽農舍記婁江繇吳婁門東流出崑山城以入于海城東五里許有分而南流者新陽江蓋别為婁江之支江之濱土田沃衍潮汐不甚鹹苦農往往瘞竹固岸下候其贏縮旱而疏焉潦而塞焉故稼穡雖凶年然亦有秋友人傅君次泉居而耕之有田若干畞可卒嵗以其地什之一藝麻麥桑苧菜果而為屋其間間之四楹足以燕妻子業詩書栖耒耜耘穫之物最其勝者江流環舍舍外之木既老彌秀且間門外無車馬焉唯鳥雀鳴且啄水聲潺潺然來風葉相和以響仰而視之山入窗牖中翠寒緑榮聳然在白日下或稍稍有雨氣鬱然而為雲吾意君自與東西家相語以外王內聖之道無與語此山在目蓋天下士矣初君居崑山今徙于兹余固未一造焉今而問之耕者曰傅先生安在曰有傅氏而農者此其居也而君亦題其居曰新陽農舍云夫農君子所小吾知君蓋識其大者而農乃其寄耳雖然古之名臣與世之王者其亦有農矣哉櫟齊記天之生材蓋未嘗有無所用者惟其有所用也而始得以為材然而有無所用者豈天固棄之以非材也歟天既棄之以非材而何其生于此也今而生之于此則固以為材矣而終無所用是天之生材亦未嘗皆有所用也而世之人方以其有所用者而誚夫無所用者之非材又以其無所用者而誚夫有所用者之徒弊其材而不知天之生材固未嘗以此而廢彼也彭君仁甫以櫟名其燕居之齊或曰君取其材之無所用有以自况也或曰君以其有所用者而藏之于是也吾觀君之為人年髙而有道不屑于世用而將以自全其天也而彼皆取其有所用者而于其無所用者則弗之取也而吾則取之焉非固取之也吾蓋以合其天而已故謂君自况其無所用者棄天者也謂君藏其有所用者咈天者也櫟木之最夀者也彭祖以之顯不為伊傅隱不為巢由而其夀至于八百此能自全其天者君而自全其天安知其不有以似之也余故為之記以期君之夀于無窮焉服記媯蜼子為閒居之服有冠有巾有衫有裳有帶凡五而屨一焉冠以布為質而髹以漆廣五寸髙二寸五分頂中央袤如其髙左右漸殺至兩端袤各二寸即其髙而四分之其一在下為武其三在上疊為三成下成衡著武兩成上皆為衡左右皆各為從迭冒之而從之末著武前後皆然乃穴其兩旁以竹為笄而簪焉漢獻帝時益州刺史張抆嘗畫古聖賢像有曽子故倣其所著冠如此漢世近古當有傳者蓋前三成以三乘之得九為乾後三成倍之得六為坤而前後各三成為六然子不知曽子所服果何如也乃若尺寸損益在今頗以義起廣五寸者倍之得十十與五為河圖中數以五乘十得五十為大衍數髙二寸五分倍之亦得五十頂左右各二寸者合之為兩偶而中央二寸五分者特為竒云巾用黑繪方一尺掩其兩旁各二寸五分疊向內得五寸廣衡闕其中而反所掩兩旁之四角向外斜出之仍中詘衡縫處褁髻于中餘使覆頂前後製帶一廣一寸長五尺自髻後繞向前為結復以所餘繞向復至腦之兩旁繞而垂之復有巾者不闕則以褁髻若古繼最耳方一尺為太乙掩兩旁為兩儀斜出四角為四象帶五尺者大衍數而三結者徑一圍三衣以布阿合幅中詘而前後埀之自有至膝後幅斜讓前幅使闊且長前幅裁其肩兩間各三寸以容領領闊二寸長與幅等而左右之掩為袵復幅縫合之為督復即前後幅兩旁當脅下裁入三寸許為袼又斜裁向下有不足者别以布續之而如其勢又别以布兩幅綴前後袼為袂又别以布闊一尺續為祛自袼之本曲裁向祛如魚腹狀而祛之口闊一尺二寸縫合之却循袂而袼極于左右齊焉裳以布六全幅為之闊狹自左端三之一斜裁至右端三之二狹者居上闊者居下縫合如帷别以布為腰而服之長至絇上而不見膚帶以黑繒復為之闊二寸圍自腰後而結于其前為兩紐垂其餘以為紳其末在衣裳齊之間屨以麻為細繩經緯而捆之其首綴繩四寸狀若弓衣為絇其跟以繩二尺許中詘而綴之為綦而綦自跟循足兩旁以貫穿于絇之間此皆考求古制而斟酌之以自便然古之意則存焉爾矣以今之人而服之也其可不自古其人也歟洪武五年春三月媯蜼子記媯蜼子既作此記或者病焉有謂今人而不服今之服為得罪有司者謂今天子嘗賜之織幣而不製以為衣為隱君之賜者蓋媯蜼子初未嘗仕布衣也而服斯服也將服之以入麋鹿之羣焉君之賜其可褻乎今之服其可賤乎媯蜼子又書清曠軒記荆溪余叔敬自兵難以來負其母間關百憂而息肩嘉定雖其妻子之計日不暇給而為其母之養則常有餘君子以是知其能孝也嘉定是時有以義士聞者曰龔孟德氏為之買田築室于錢門塘上而叔敬居焉州大夫張侯聞而嘉之乃題其居曰清曠之軒夫所以清曠云者髙人韻士之所樂也是未見叔敬之所以能為孝者然自四方用武諸侯王驕且僣東西南北之交兵者不知其幾家而其宫室貨寶管絃歌舞之娛有自若也士於兵戈中有能脫臭腐而免創殘其父子妻子或完以存有不得不竊祿以為養者由是其一身之生死繫乎是即有變故則其家之人安所仰哉以叔敬家傾母老而猶不肯茍仕其必有所見于此也有田十數畞雖薄且少然其身未老足以親稼穡子將壯足以力耒耜古者盡地力之法猶可為也于是米麥茶筍以為飲食綿絹麻葛以為衣裳雞豚羔雁以為甘旨忠信慈孝以為恆心叔敬蓋無慕乎其外者方且母子相樂以終其未來之年視夫昔之王侯有不翅如浮雲萬變而其跡至是已茫然矣則所謂清曠者于以見叔敬之超然不為世纍以能自力于孝也叔敬之子迪嘗從余遊而叔敬亦起余者故為之記以表異之云蒙齊記始彛居吳東練祁市覃懷張君子視實來彛與之切磨問學期以古道相振厲而張君每嘆夫末學之趨人而人之知志乎古學者鮮也若欲勉彛以進修于斯彛竊自賀其得以友張君焉方是時彛遭家難迹之不涉吳者且七八年異日頗得詢張君吳之大人君子志乎古學為某某而張君亟稱韓君公望之為人且曰韓君識趣似古狂者以目眚廢而今則收斂之功尤有加于昔矣彛又竊自賀其得以聞韓君焉自是張君一再往來吾二人間而彛往之卷卷頗聞于君之耳而君于彛亦若欲取焉以相友者亡何君即世而彛始來吳首謁韓君至其家彛與君至是始相識蓋恍乎其如覿張君也間謂彛曰奕始目眚時嘗筮得蒙自謂吾目不可以復愈也而果不可愈噫今十年矣于是題吾所居之室曰蒙齊以自辨其蒙云既而徵彛為文以記之而彛亦弗能已于言也乃斂袵而復于君曰知君者莫如張君知張君亦莫君若也今而張君已矣而是記乃不求之其未沒之日而以屬之彛焉非有若張君之篤學懿行而何足以言蒙也且蒙取山下出泉之象寓在險而止之意居蒙昧未明之時有純一養蒙之道其見于先聖先師之言則已偹矣彛雖有言亦君之所嘗聞者爾以言之君固已犯於再三則瀆之戒亦何足以言蒙也然嘗反而求諸張君之所稱道者矣謂君以目眚而將加其收斂之功也姑請以是而言之夫人之耳目口鼻其觸於物而動于心者皆然也而目為甚目在我也物之接於逺近髙下險夷有不期見而自見者而耳目口鼻又且各為之用矣君子有視聽言動之則而視之為首焉蓋視必以禮者目之則也目之不踰其則而視以其禮則其必有所養矣君之目雖眚而明猶存所以制夫物接之來以為一心之養者猶自若也然其要則非由于既物接之後而常本于未物接之先蓋必屏絶其衆妄之憧擾齊居乎一室之中戒謹恐懼以養其心之所未發者而不待其既發而禁之焉作聖之功夫豈必他求而得之也彛也寡陋無似方自病其蒙之未擊者碩因君而有聞焉王常宗集卷一
