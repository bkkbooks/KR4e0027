body:
  text: 王常宗集卷二明王彛撰序蒲山牧唱序右蒲圻魏公詩若干卷彛既叙次為若干卷題之曰蒲山牧唱者仍公初藻之所名也初公以元至正間韞經濟之業居蒲首山中而志有所待㑹兵難荐作乃出故山以擇真主而帝業則既已大建于江左矣於是振衣入朝一見即被顯用以直筆居左史以禮典職奉常以忠言直玉堂以清節振風紀以善政典畿郡以正學輔春坊以碩德長成均大抵皆公前日山中所韞之業也而又時而出之以見於文辭而以鳴國家之盛焉詩其一也嗟夫世之為詩者衆矣而足以鳴國家之盛者豈徒然哉公之詩則所以鳴國家之盛者也然而有其故蓋公之為人所以成其學者方正而淵懿所以達其材者廓大而宏偉所以存其心者軒闢而洞達所以養其氣者雄深而淳龎故其發而為詩也有含㴠蓄積之量有蜿蜒旁礴之態有從龍上下澤潤萬物之化若蒲首山中之出雲者然蓋蒲首蒲圻之名山也蒲圻武昌之望縣也蒲圻為縣廬阜峙其東洞庭匯其西衡嶽蟠其南岷山江流其北而蒲首實屹立乎其中自昔號楚南勝處而公之生實得其山川之秀則宜乎其發而為詩者若此也歟今所叙次其作于山中者兵難以來所存則已無幾而作于朝廷者雖不甚具藁而猶多且富蓋亦公山中所韞之業之見于文辭者耳則初藁之名顧可易歟公昔山居時元吕忠肅公得其詩以擬杜子美氏今求之集中信然送沈亨伯之雲間序吾家文中子嘗評六代文士之文咸有譏焉獨于陸機則曰文乎文乎夫文中子以王道自任出而為帝者用則足以太平一世禮樂有粲然者不用則退而續經以傳方來士衡文士爾蓋非有經世之文也文中子顧取之若此吾嘗疑之及讀士衡所著辨亡論見其所謂彼此之位殊受任之才異者然後知文中子不徒稱美其文而固有所感于兹也當隋之大業取陳以一天下也文中子嘗以策獻闕下以不見用而去然而隋之政如彼也文中子之道如此也至是隋之為隋蓋有逆知其將來者其于辨亡論之言能不有所感哉東陽沈亨伯孝友而好文吾因忘其年之少與長而以為友而亨伯于余不啻若師友也今將卜居雲間雲間士衡之鄉邦也蒸嘗在焉亨伯宜謁于其祠且以吾之斯言而告諸其鄉之人其必有同吾文中子所感者而吾之言為不漠然也已聚英圖序洪武三年秋七月余既得旨賜白金名幣歸養蘇之嘉定而卧病國子學不能趨拜闕下乃拖紳受焉是日嘉定周孟容自客邸來候余疾曰先生之貌則癯先生之神固腴也先生之病則窮先生之道固通也小子不敏竊嘗圖先生緇冠深衣而埀紳暗然有千載之思焉在前數年時以是卜先生行藏今歸蓋叶所圖者惟先生為文以贈我既數日余舁疾東歸弗果為㑹孟容亦還復伸前請且曰小子嘗圖當世知名之士今既盈笥乃聚而裝潢為帙得先生文則以冠帙之首余觀帙中有自號鐵崖先生者是為㑹稽楊廉夫其為人若秋潭老蛟怪顴異顙目光有稜其狡獪變化發諸胸中則千竒萬詭動成文章孟容所寫蓋得其混跡斯世與時低昻為文場滑稽之雄可謂善知鐵崖者有王翰林子異充者其文章與宋景濂先生相上下而同在太史氏天下以王宋並稱翰林年未五十而鬚髮俱白目朗而眉秀頥豐而準直其形若霜晨野鸖矯抗無媚容孟容所寫蓋併得峭直之性峻潔之文可謂善知翰林者又有張孟兼者年甫出三十而少余二嵗余最與之相知今官禮部有能名其為人眉疏顴聳目長而清口角拱而善辨孟容所寫望而知其為俊才也其他公卿大夫又若干人孟容又皆隨其人之崇卑顯晦進退出處而圖之余雖有識有不識者皆可即是而得之目中焉于是盛世知名之士班班焉有可考者余故為名其帙曰聚英圖而序之然余惟列前三人而論焉蓋鐵崖吾為之論定於其既往孟兼吾為之期望于其方來而於翰林特云然者使人知文章名家自有所在也而帙中顧獨無宋先生先生嘗見王翰林像而欲挽致孟容孟容曰吾方理歸裝心已東騖懼不能得先生之神全也蓋化工生人傳神者其胸中與化工相融㑹則下筆而各得其神今人傳神惟得其貌而已宜其與人神大相逺也孟容可謂得其神者矣孟容持此帙之京師介吾斯言謁宋先生而圖其像以為窮鄉下邑之觀瞻則區區之願也是年冬十一月送李道士序世有老子書者或曰與易相表裏或曰孔子曰老子其猶龍乎夫易六十有四卦而乾為之首乾之六爻龍以為象或潜焉躍焉見且飛焉而或至于亢者時而已老子生周之季世見時之不可為也曰潜其吾之時乎故退以為進亡以為存卒潜而不見是得易三百八十四爻之一而為龍之潜者也孔子則時而潜時而躍且飛時而幾乎亢則止其進退存亡與易為無窮而龍之變化俱焉吾故曰孔子其猶龍乎老子潜龍也雖然世則有孔子矣世之不可為者孔子其為之矣接輿沮溺晨門荷蓧皆其潜也老子其潜之尤者哉潜固為老子之時也李𤣥遭世亂學老子之道自吳門遊浙之東將尋深山窮谷而潛其身𤣥也其終潜也歟送張容自松江復歸桐廬省所生父序自天下分裂人不得返其鄉土死有遺哀者多焉今四方既定而張生乃得歸桐廬省所生父湯翁蓋不相見者十有餘年至是復相見始生奉翁命出後其鄉友張君從君避兵松江今而張君殁翁謂湯自有子張之義當為後生乃復來松江已而復歸省焉張君世所謂扣笛山人者余友也余故以贈生曰死者不可忘生者尤不可已也生聞其言而泣焉何也生固以為死者不可忘生者尤不可已也嗚呼生之心其可悲也夫其可感也夫贈李崇德序適齊魯者必求其縉紳之儒弔燕趙者必求其豪傑之士乃若見吳人而擇其禮讓之風遇楚人而增其騷怨之思乃行乎周秦漢唐之故墟則又必求其人而詢其當時之人才而治亂所繫每至于悲吟憤悱而不能已者蓋各有所感然也余自少遨逰東南因讀書天台山中方是時余忠宣公僉憲東浙而余以弟子貟拜公於其庭公曰我在昔亦廬江一弟子貟耳自少即知慕周瑜陶侃之為人而至于今也若等庶採此志哉視公之容若愀然而有所感者而吾猶不知其然也其後兵至四方公之守安慶者七年孤城無援而不以動卒至于竭忠以死斯人也非獨為廬江之榮而百年間固不可以屢見者余于是知公昔年之所感者在于此也嗟夫為公瑾者固有關于吳之重輕而士行亦晉之所以存亡者而公則在今天下其大義所著亦一代之所繫以盛衰者是則廬江之人古今蓋同然也余于公安得不重有所感歟余嘗欲書公平生以待太史之擇而知公者恨不多也余又安得不重有所感歟㑹稽陳某為余言有李崇德者廬江人也其為人究古今知治亂磊落慷慨然不以自耀寄跡于醫蓋竒士也今則居南都焉吾子茍為文以遺之其必有復于吾子者而吾子之所感者庶乎其有以發之也雖然余也識公于草年之前而信公于草年之後夫以草年之間盛衰治亂之相仍其倚伏變化固亦已屢矣而余于公尤獨有所感焉者雖余亦不知余之為何如也然則若李君者其必有以發余之所感矣乎送張侯詩序去年秋彛始還嘉定既至則驚而顧喜而復感且幸焉先是聞松江有以其鄉兵為姑蘇援者其徒或蔓延嘉定而今既已平矣余意嘉定是時且無噍類及還而彛之家完然以存州之人民益以蕃庶問誰為之而得以至是則皆曰吾州守張侯字孟循者是也在夏四月侯方坐堂上而松江人以其徒荷戈而來侯叱之曰若等非病子則狂童也今姑蘇亡在旦暮尚誰援哉于是皆舁侯往松江侯又以是叱其為首者越二日師至遂平松江侯上謁其將軍曰嘉定非叛我者弄兵自松江耳欲以其餘生贖嘉定數十萬人命侯乃以將軍令還嘉定縛為松江之徒者數人而為􅊾告州人俾無他虞故至于今城郭能若是也彛以是知侯有功于其州之人甚大明年提刑使者羅織侯罪狀侯吐語慷慨終始一弗動至是乃棄官而歸其鄉彛以是知侯之心雖屢遭難而不變者又甚堅也州人曹貞集其大夫士詩若干首以待觀民風者之有考于斯也而俾彛序之夫活人而不有其功仁也誣之而不改其守强也至位而無所喜去位而無所愠有道者也若其某政某政之善且公也槩可見矣觀民風者有能以彛之斯言而上聞焉其于王家知人之明庶其少補也哉衍師文藁序至正間余被圍吳之北郭渤海髙君啓介休王君行潯陽張君羽郯郡徐君賁日夕相嬉逰而方外之士得一人焉曰道衍師其為古歌詩往往與髙徐數君相上下是時余所居鸖市聚首輒啜茗坐樹下哦詩論文以為樂顧雖禍福死生榮瘁之機乎其前亦有所不問者師儒林之出也而託跡于浮屠之間余故不以浮屠待師而師亦不自待以為浮屠而已也送浮屠祖默詩序夫浮屠者于其師自言其道也而譯之以中國之文然中國之文非徒文也道在焉而已祖默以浮屠而求余文余之道與浮屠不類伏羲神農黃帝堯舜禹湯文武周公孔子之道在昜書詩春秋者羣聖人之文也文至是考之千萬世而準矣浮屠與吾人同則其目與吾目同也取而觀之可也吾之說有所謂太極者弗離于隂陽弗離于隂陽也原始要終以知死生而弗以其幻也人心道心有精一之功以執中也建中建極為斯人之歸也正家以王化先而可以動天地感鬼神也尊王室斥强侯以誅賞萬世也此易書詩春秋之㫖而羣聖人之道也今浮屠為空之說則外隂陽而求其本初矣為死生輪回之說則以為幻矣為覺之說則無假乎精一之功矣女無家男無室則夫婦不必為之化先而皇極不建可以訓天下矣浮屠之師西教也其為率中國之父子昆弟靡然而由之則中國之人不必待中國之聖賢而惟西教是師矣然則為浮屠者易書詩春秋之文且不必有伏羲至于孔子羣聖人之道且不必行而默乃欲求余之文以出諸其徒而觀之余亦不能捨吾中國聖人之道易書詩春秋之文以為文也默方將適東南諸州而求其徒以師友之其徒有讀吾易書詩春秋之文而知其說者豪傑之士也送浦士文赴廣州詩序蓋夫弧矢懸門蚤見四方之志梯航通道爰觀百粵之風既遐邇以同塗豈華夷而殊化是宜褁糧以作振袂斯逰也今士文抱慷慨之才吐鏗鍧之語芳胄則崑岡侔秀修名則婁水皆馨將發揮壯懷搜攬勝槩載斗酒以出祖秣馬吳門指江漢以問津揚帆楚裔式訪庾梅于嶺表仍尋堯韭于澗濱則必有羊仙並迎蛋夫前𨗳者矣于是同袍羣餞别醑朋傾契夙擬於金蘭句新裁于珠玉余故即其首簡冠以序篇云爾髙季迪詩集序髙季迪詩集凡若干卷郯郡徐賁所編次而稽嶽王彛題其帙曰髙季迪詩集而為之序焉季迪嘗仕而顯矣當未仕時即以詩鳴世有稱其作者特以季迪而不以官季迪之詩不以仕而顯也蓋季迪之言詩必曰漢魏晉唐之作者而尤患詩道傾靡自晚唐以極於宋而復振起然元之詩人亦頗沈酣于沙陲弓馬之風而詩之情益泯自返而求之古作者獨以情而為詩今漢魏晉唐之作其詩具在以季迪之作比而觀焉有不知其孰為先後者矣嗟夫人之有喜怒愛惡哀懼之發者情也言而成章以宣其喜怒愛惡哀懼之情者詩也故情與詩一也何也情者詩之欲言而未言而詩者能言之情也然皆必有其節蓋喜而無節則淫怒而無節則懥哀而無節則傷懼而無節則怛愛而無節則溺惡而無節則亂古之聖賢君子知之其於喜怒愛惡哀懼之節所以求之其本初者至矣故不言則已言而出焉喜也而明良之歌作哀也而三子之歌作愛也而甘棠作怒也而巷伯作懼也而鴟梟作皇矣之赫然又因其怒也而作蓋方是時天下有聞而鼓舞之者或瞿焉以俱喜或勃焉以俱怒㦯悚焉以俱懼或惻焉以俱哀㦯慊焉以同其所愛惡若有使之然者此無他已與人同其情亦同其節則所以為之詩者非詩也天下之情之有節者為之也夫以其有節者之情以為之詩而詩之節如此其至也匪聖賢君子其誰能與于斯哉故言詩而至於虞周之間君子以為後來者之無詩也然而甚矣孟子曰詩亡非詩亡也人之情不亡詩其可以亡乎蓋詩云亡者情與詩無節則猶無情猶無詩也于是有得詩之情而復有其節者世雖漢魏也而猶有古作者之遺意焉世日逺而情日漓詩亦日以趨下則斷自漢魏而後謂之古作者可也夫斷自漢魏而可謂之古作者則晉宋及唐茍有得夫漢魏之情者焉謂之漢魏亦可也而世之作者乃欲即其無節之情以為之詩至併與其情而遺之而曰詩固如是然而漢魏晉唐之作者不爾也吾固觀夫季迪之詩而不敢以為季迪之詩且以為漢魏晉唐作者之詩也季迪名啓季迪其字也其先渤海今為蘇州人生元末不仕國朝以儒士與修元史尋入內府教胄子授翰林國史院編修官已而擢為户部侍郎辭不拜有㫖賜歸其鄉云送彭杞序江淮之間有友焉曰丘先莊曰孫希萬而彭杞者孫丘友也自張氏據姑蘇江淮之人以親戚鄉里故皆莫不負父母提妻子來求一日之祿丘與孫不為也而彭亦不為也張亡先時之為祿者亦隨以俱腐丘與孫自若也而彭亦自若也余初不識彭至是始識之為其孫丘友也視之若孫丘然今孫丘俱以秀才起家為侍從彭方賣藥四方其出處始異然孫丘于彭又安知無招隱之作也美張彥和詩序醫之道由帝鴻氏而下作述不一其人至近世劉河間張戴人曲暢其㫖勒為成書則尤簡易明白于時宋金列土並國二人之道北而未南皇元既一四海兹道雖駸駸乎南而狂于所集者政不無也嘉定縣居東南之陬乃有業醫而逺宗二人者聲教自北而南可即是而窺矣若張彥和是也彥和醫士一旦企二人之道讀其書而有所嗜焉有嬰疾者造彥和所或迓彥和于家即以是學而措之百不失一咸稱之嘖嘖然草堂鄭君謂余曰往嵗吾疾更吾生者彥和今又吾室人疾更其生又彥和惟餌藥而一無所償大夫士詩以美之吾集而畀焉子以為何如余謂彥和療人于艱難之秋草堂酬德於貨利之外皆義也何說之為然彥和氏曰張字曰和業曰醫于戴人不能必其所出之戚疏所志之髙下所得之淺深而業曰同氏字曰同固將于其同而不于其異也且戴人河間之出當北南未一而生于北欲求東南之陬企其道如彥和者無有也彥和南産乃企其道于北之人蓋必有故矣余是以有自北而南之說然則草堂之集是詩不獨畀彥和尤可陳之觀民風者焉送國子周衍覲省還國學序天下有言之必至于是而止者天下之人皆莫不曰然至于萬世亦莫不曰然故舉天下皆水也皆山也有人焉粵産也目未睹泰華也與之言天下之山必至于泰華而止朔之人跡不涉東海也而凡言天下之水必至於東海而止是泰華也東海也言之天下而無不曰然也至於言天下之羽毛鱗介也靈必至於龜神必至於龍瑞必至于鳯麟而止言之天下而莫不曰然又至于言天下之草木必皆至于徂徠之松新甫之柏而止而天下亦莫不曰然又至于言天下之所寶者金曰南金璧曰和璧而珠必曰夜光而止言之至于是而天下無㦯有不然者又至於言天下之器於尊彛必曰禹湯也于衣冠必曰衮冕也弓曰繁弱而刀與劍則必曰干將也莫邪也言之至於是而天下亦皆曰然至於言天下之技也射至羿而止工至般而止奕至秋而止御至王良造父而止若醫巫至陽咸和綏盧扁之徒而止而天下無不曰然今天下之勢舉海內外以為家凡天下之人而言夫此州也彼州也其城闕宫室壯且麗亦必至於京師而止故曰邦畿千里惟民所止言天下之人之所趨而必至于是者也然而有國學焉又帝王教天下之士而天下之士之所趨而止焉者非孔子之道弗由也非孔子之書弗讀也故其言天下帝王孝至於舜而止仁至于堯而止有道而無為至羲農軒轅而止去暴安人至湯與武而止凡其當時之臣有功天下者以言平水土也至禹而止稼穡至稷而止禮樂至䕫伯益而止刑也至臯陶而止自任天下之重在商伊尹在周周公必至是二人者而止至孔子而述以為易書詩春秋而天下言集羣聖人之成者必至于孔子而止蓋天下之言孔子者不惟天下言之而且千百萬世共言之而無有不然者而况于京師乎况于國學乎宜其言之必至於是而止也崑山周衍學于國學者有年矣今而歸省崑山又將還國學而卒業焉彛固欲其學之必至于孔子之道而止也故以凡天下之所有者而皆莫不要其所止而以孔子之道終焉書之以贈送林醫正覲省復還朝詩序洪武七年春三月丁卯朔醫正林以義既得㫖省其父蘇州陛辭上謂以義在父前當如兒時以義以楚萊子斑衣事對稱㫖以義至其家宣上德意其父拜手稽首感激倍萬而以義歡欣鼓舞果能如在兒時踰月以義還朝郡守蒲圻魏公首賦詩為贈一時大夫士和者至若干人得詩若干什稽嶽王彛序之曰聖王愛民如子事天地如父母故能有人之父母之心又能有人子孝其父母之心也今皇帝之事天地宗廟也極誠盡敬無乎不至以是知天下之人之孝其父母者宜亦若是醫正藝藝以事上是行也天語乃及是焉非私醫正也欲其赤子之孝其父母者皆必若是皇帝所以為億兆人之天地父母也先是有㫖下郡縣行鄉飲酒禮六年魏公行于郡學有周老人百有十嵗楊老人九十有三嵗林老人實醫正父九十有二嵗今年春鄉飲酒而三老人尚無恙豈天地父母之恩獨厚于蘇歟且林老人者今年九十有三有五丈夫二女子子而其子復有子有孫老人至是形神不衰生受其養而醫正又加榮焉豈天地父母之恩又特厚林老人歟魏公賦詩不獨為林老人父子於以詠歌我國家天地父母之恩實自蘇始則是詩也固亦與行葦之雅並傳也哉其年夏四月庚子序送東傳師住天平白雲寺序佛寺莫盛于浙之東西蘇為浙西名郡其樓殿所存亡慮千百區以山水之秀而著者皆是也而又加以前人之所題詠在唐若韋應物張懿孫白樂天孟東野張承吉陸魯望皮日休者固未可勝數也惟虎丘靈岩出于伯業既去之後雖其人跡盡山水蕭條猶足以想見其萬一者則人為覽今弔古者之所喜逰而樂道之也天平在蘇城之西與靈岩鄰而其山特髙以起為衆山所環揖固已擅其山水之秀而白雲寺又范公托足以守其先公之墓且即而祠焉蓋公為宋之皋䕫伊召三代而下所不數見者也且其孝思所在固有昭然而若新者矣彼伯業之殘題詠之細又不足多也公之裔孫有為浮屠師曰良公者住杭之靈隱寺為名浮屠于是主教者即以其徒曰教字東傳主白雲以守先墓東傳以能詩有聲江湖間且有卓行吾固以賀白雲之得其人與良公之得其徒而文正之所望於後人者又在是也東傳之行也諸大夫士請即其山水之秀分題凡十有二而各賦詩以送之天平山水之秀固將因是詠歌而躍然於目之前于以寓其所懷于無窮也然余數夢逰山中拜文正之儀容既覺而霑襟焉則余之有懷於兹者其有窮也耶其不有窮也耶送吉無咎之延安序余蚤作有老先生者暨徐逸人槃同謁余歸養堂上曰無咎之行也將有言以贈之惟先生言不妄出且有文在史氏可傳信冝贈既而方氏兄弟曰嗣宗曰矩者復來亦以為請余以為無咎之斯行也亦有虞乎否也老先生曰無咎之母老矣始無咎自嘉定如京師輒行役夀州復從守將開軍府于延安距嘉定萬里而逺母子不蚤暮見吾意無咎斯時其情為何如頃無咎以軍事自延安赴京師得東歸覲省其情又何如今無咎行且辭其母復之延安其情又何如吾用是為無咎虞也余曰男子生而射六矢示有志於四方上下以無咎家居姓名不出百里顧雖日夜弄雛母側視飲馬河洛據鞍覽終南嵩華之勝於是發揚其志氣建功名萬里外使天下後世知其為誰氏子果孰大孰細哉以無咎披枯竹斷葦與鄉里迂生撡一曲之說妄論古人陳迹視身涉周秦漢唐之故都弔古明王哲臣豪傑之士而詢其父老若親見之又孰勝孰負也况無咎之室人能順母安焉有子能讀書知孝且弟母樂焉無咎雖去家萬里何虞乎嗣宗曰壯㦲斯言請以為無咎贈余曰未也自天下變故盜名字蜂起西北之人往往棄詩書事戰鬬國家既戡定其土思所以為治教者於是以羣進士牧焉而東南産於嘉定特拔其三人有金文徵者嘗受學先君子有黃琮者余妻弟也金同知鄜州黃知鄜之中部縣鄜延安屬州也有徐奐者與余尤相知亦為環縣丞皆受約束于軍府無咎至問經術于三君三君亦問無咎以疏通之政且時循鄉里好諸君皆有親康强他日尚先後歸榮其鄉而交拜堂上余雖閉門讀書不暇出入然聞其歸亦將持酒肴候至門外問無恙也老先生者四明陳尚吉也王常宗集卷二
