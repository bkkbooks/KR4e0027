body:
  text: 王常宗集卷三明王彛撰說雜說天左旋斯其經日月為緯自左升一經一緯天道成月行速日行遲君逸臣勞故臣有為君無為天命至善人性斯其源故謂人性惡豈誣人抑誣天井田以養人庠序導性善貧富知愚庶不大相逺天命之性堯桀一形色之性至萬億自人其人斯為仁仁匪自外人之心人之身堯舜世多聖賢九官特知名叶而其餘弗傳豈無皋䕫者焉世有桀紂堯舜其湯武世無桀紂商周其唐虞堯之政舜攸作叶舜政既成授之禹周厲過紂周胡不亡有宣王幽復過厲周猶東叶諸侯非湯回具體孔子禹具體舜微回微禹焉别大聖商先王從諌周造人紀亦有暴孫仁人諌死一亡一興由從諫與否叶詩亡風有王文侯之命書以亡仲尼作春秋豈惟詩亡抑書亡是故傷書亡著秦誓匪以其悔憂秦彊三叔流言公居東三年王不疑公金縢弗傳象既以見舜在床為鬱陶我思悔心斯萌叶心之仁不仁吕政君秦不韋之子孰謂柏翳後秦已不祀伯夷弗是避叔齊避兄置社稷以去疇其承曰有仲子故求仁得仁政也禍萬世子扶蘇賢胡亥殺扶蘇再世弗傳不仁而善沒抑何有天舜卒鳴條為東夷之地彼蒼梧有竁蓋象封有畀舜衣冠葬是龜書區以九九州是取明堂九室井田百畞說龜龜為四靈之一能前知吉凶以告視鳳麟龍尤靈也然而龜則靈矣而不能以自靈尤必假諸人以察其食墨某某如何以我之靈契彼之靈而後靈矣茍是龜也食墨若此而人之言焉者不曰此而曰彼至于所言不契則往往曰龜其不靈也耶噫龜其果靈也耶無亦人之不能靈其龜之靈也余笑世之恆人固亦有龜言而弗靈者然猶曰國之蓍蔡焉能不有愧于龜哉說彀百步之外一舉足而已舉足而如其數焉可至也然足或不舉則心之所注手之所施者不能以措之其地于是有可以措之其地者足亦未嘗舉也發之此即應之彼有不翅如響之于聲者蓋必有其故矣自昔聖人知之取物之剛徑者揉之而使其詘焉取物之柔韌者縆之而使其直焉合之以為器用之兩手之間而百步之外固在是也雖然任其力于兩手之間者臂也伸其左而詘其右撡之而器以張縱之而器以弛然而弛非如縮也張之限存焉張非如嬴也弛之機寓焉張也弛也蓋皆以其度而已矣且夫所謂度者何也當然者也自然而若使之然者也惟其當然故不至是不止惟其自然而若使之然故未有不求至而自至者此弓之為物所以必至于彀而止也夫不知其道之當然者捨彀而弛之者也知其自然而不能使之然者彀之怠者也使之然而不能盡其當然者彀之畫者也即其彀以彀之而弗怠弗畫者彀之必至者也然則世之有志于彀者其可以怠且畫乎印說吳人李明善刻印章必本古制考古書余嘉其好古也故為作印說曰夫印非古也古者琚珩以為佩符節以示信皆聖人作也史曰蘇秦佩六國印印固始六國至是琚珩符節變而為印既以為佩且以示信是猶琚珩符節之意則不可謂之非古也吾觀今之所謂印者其不合于古有五秦印稱璽其以玉者不通臣下至始皇乃制藍田玉螭虎鈕為天子璽皇后以金亦曰璽下至二千石皆曰印至漢諸侯王金璽槖駝鈕徹侯相國三公太尉前後左右將軍皆金印龜鈕御史大夫凡吏秩比二千石皆銀印龜鈕二百石以下皆銅印鼻鈕今玉與金璽曰寶惟銀與銅曰印而其鈕又不為鼻為龜為槖駝其非古一也又印與璽皆不甚大所以佩也故各其綬焉秦惟天子之璽方四寸其餘皆方寸漢亦方寸印北齊璽有寸二分者有四寸者後周璽寸五分三公諸侯寸二分其餘皆方寸晉周顗雖曰取金印大如斗亦大言耳今璽與印果有若斗大者且不以佩其非古二也又古者一官一印居是官則佩之罷則解之故在漢有自謂十腰銀艾者至晉始惜金銀銅炭之費自是衆官用一印今皆然也其非古三也又書同文盛世事也故王者必考文馬援為伏波將軍上書言臣所假伏波將軍印文伏字大外嚮又言城臯令印臯字為白下羊丞四下羊尉印白下人人下羊縣印文不同非所以為信事下大司空正郡國印今印文不師古紆回而屈曲之寡以為多縱以為橫曰疊篆其非古四也漢太初元年改正朔數用五于是丞相印文曰丞相之印章諸卿及守相印文有不足五字者以之字補之今印文視所用數有嬴有縮其非古五也夫王者不欲復古則已必欲復古其于所以傳信天下者殆不可緩也雖然天下之非古者多矣又豈特印璽而已哉而余于兹固不得不重有所感也或曰子為印說蓋以資明善之好古也然子所論有玉也金也銀與銅也而明善每為人刻象齒焉烏在其為好古也是不然衛宏有云秦以前民皆佩綬金玉銀銅犀象為方寸璽各服所好今璽以玉寶以金官印以銀以銅則私印以犀以象宜也余于是益以信明善之好古也茍有誚夫明善之非古者出余之言以曉之惺惺說世固有同言而意異者君子或假其言以宣其意焉上蔡先生蓋嘗以所謂常惺惺法者而語夫敬矣而惺惺字古經傳所無有獨浮屠喘岩言主人翁惺惺否曰惺惺是則所謂常惺惺法者無亦與岩所云者同乎夫惺惺之言一也彼固言心吾固言心吾之意必常惺惺則可宰夫物彼之意空萬物不有則心常惺惺一彼一此不同何如心宰萬物而不宰于物者也能不有蔽固自惺惺今乃時而呼以惺惺如家僮然則此呼者誰邪應者誰邪是又以一心制心為兩心矣心如此乎先生之說固非如岩所云者學者于此有能主敬以體諸其心也則知立言之所以不同矣贊朱文公像贊廣大精微剛健中正敬義皆立明誠兩進折𠂻羣言禆輔六經宋之夫子儒之大成貞觀納諫圖贊魏鄭公納諫文皇其象如此蓋宋米芾所畫也布衣王彛今觀于陳寶生家為作贊其上臣哉諫逆君哉聽從出武德後際貞觀中革彼隋汚作此唐隆世有文皇豈無鄭公有元故崑山州儒學教授恭孝先生王公遺像孝子彛拜手稽首而作贊曰文弊有作正學自蹈深衣講堂朝衣清廟丘山德容淵泉心思于乎恭孝侯邦之師陳寶生畫像贊貞門有孝展也能子夷居而華鬱為義士圖書在堂雅頌以琴不寶金玉寶此古心雜著史約名目歷書曰天之歷數在爾躬蓋帝王相繼之次第猶嵗時氣節之先後故自堯舜至宋德祐主尚論其世稽諸經訂諸史而約之以為書歷為之首有正閏焉列之以天時疏之以人事大抵推春秋之意倣綱目之法而定著夫千載興亡治亂之槩云統凡帝王有天命以一天下者有統焉其子孫世守之或其統中絶其子孫有起而續之者某帝某王各載其一世之事曰帝王統孔子雖不有天下而為師萬世有道統焉帝王之所宗也儒者以為素王故亦著統曰素王統帝王之后妃子孫附著焉纂諸侯有國而子孫世守之者各載其一國之事曰諸侯纂諸侯之夫人附著之述人各載其一事曰述有正述有通述有反述有特述有旁述有雜述有外述正述者述以為天下後世之訓者也大臣諸名臣諸名儒死節之臣死事之臣孝友之士卓行之士隱者列女通述者偹述焉者也諸臣諸儒諸子文士䇿士反述者述以為戎者也强臣奸臣侫臣嬖臣虐民之臣失節之臣亂國之臣叛逆之臣僣僞羣盜特述者猶特筆也傳道之儒逸民豪士旁述者述其似是而非者也異端若楊墨佛老與儒名而釋學者雜述者不欲以一端名者也若刺客遊俠滑稽貨殖方技諸雜家外述者外之也四夷記中國無統為中國之緒餘曰記中國之統絶而復續然而有相敵而並帝者曰别記中國有統他族而並帝曰别記無統曰外記中國之人與吾並起吾有統而彼皆無曰附記中國無統而各有其土曰雜記其家人附著之考考一代之制度曰考天象地理歷數食貨禮樂兵刑庶官經籍文妖天下之所謂妖者狐而巳矣然而文有妖焉又有過于狐者夫狐也俄而為女婦而世之男子有不幸而惑焉者皆悮謂為女婦而相與以室家之道則固見其黛緑朱白柔曼傾衍之容而所以妖者無乎而不至故謂之真女婦也雖然以為人也則非人以為女婦也則非女婦蓋室家之道之狡獪以幻化者也此狐之所以妖也文者道之所在抑曷為而妖哉浙之西有言文者必曰楊先生余觀楊之文以淫辭怪語裂仁義反名實濁亂先聖之道顧乃柔曼傾衍黛緑朱白而狡獪幻化奄焉以自媚是狐而女婦則宜乎世之男子者之惑之也余故曰㑹稽楊維楨之文狐也文妖也噫狐之妖至于殺人之身而文之妖往往使後生小子羣趨而競習焉其足以為斯文禍非淺小文而可妖哉然妖固非文也世蓋有男子而弗惑者何憂焉鶴瓢志草之蔓生而實者有曰瓠其為形也有首焉有頷焉有腹焉有無頷與首而唯皤其腹者焉而其修短大小圓曲卧立之狀不必同也其為器也可勺焉可壺與瓢焉其完而穴之離而判之用之不必同也道士李睿畜瓢一昻首修頸而腹果然其狀肖鸖以為勺則大以為壺則曲乃刳其腹出其犀空然以為瓢而全其為鶴之狀因字之曰鶴瓢余過之睿出以為飲豫詰之曰瓢之狀若是也肖夫羽族者衆矣寧猶鶴而巳也睿曰鶴逰方之外而豫所友者也昻乎其峙也泊乎其無所嗜也儼乎其難進而易退也鶴乎其知警也察乎其髙逝而逺引也而斯瓢也乃適肖夫鶴而豫之飲輒以是焉豈偶然歟始余之字之也或曰似乎雁禮有木雁雁字之可也余則憂其乃鳴而遭烹焉或曰似乎鳬禮有鳬尊鳬字之可也豫則惡其與波上下而偷以全其軀焉或曰刻管施簧順之以為笙則其聲似鳳而豫又嫌夫世之人以鶡為鳳也彼其言木雁言鳬尊者嘗自以為知禮矣言鳳笙者亦嘗自以為知樂矣而余老氏徒也夫焉知禮樂哉此鶴瓢所以字也嗟夫不能鳴者庸人也與波上下者侫人也以鶡為鳯者小人而謂之君子也然而鶴者逸人也睿于是得所處矣作鶴瓢志跋陶淵明臨流賦詩圖陶淵明臨流必賦詩見山則忘言殆不可謂見山不賦詩臨流不忘言又不可謂見山必忘言臨流必賦詩蓋其胸中似與天地同流其見山臨流皆其偶然賦詩忘言亦其適然故當時人見其然淵明亦自言其然然而為淵明者亦不知其所以然而然也又何以知其然哉蓋得諸其胸中而已矣王常宗集卷三
