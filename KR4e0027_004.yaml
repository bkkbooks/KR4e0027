body:
  text: 王常宗集卷四明王彛撰雜詩露筋娘子詩毗陵謝君子蘭以其家藏米中嶽所撰露筋廟碑刻本索余賦詩按輿記云云而方輿勝覽亦言云云今碑乃曹氏所傳其詞曰云云余故為追敘其事而貫穿以碑所言云云者以傳于代云淮城小如蓋僻在湖草邊蕭條城下路昔有兩嬋娟秋姿豔明月相携良可憐小姑泣向嫂薄暮慘墟煙炎天值暑溽一望白水田䆉稏雜稂莠逺與蒲荷連落日帶沙岸滿耳雷闐闐倣徨自相弔所惜在青年依稀雙影長顧見返照前修途行旅盡惆悵不能還夏蚊喧且起著面劇霜鸇囊空無帷帳奈此萬嘴穿前村有雞犬燈火見歸船茅茨出叢薄隱約四五椽匪無有帷子叩門聊息肩嫂云得相依小姑淚濺濺冰肌與玉體忍萎一夕眠風生翠木下兀兀坐為禪噆膚攢利鏃灑血亂幽泉平生弱女子苦當雞肋拳肉盡志終定柔筋露蜿蜒森然出天巧工豈人力鐫含笑化為鬼攝衣上雲軿素娥共蟾窟錯落諸星躔天孫下機處一時成俗緣何如作貞鬼心不愧青天終為甓社珠與月鬬春妍千年露筋碑野水流涓涓崇祠闖水裔蛛絲榮几筵明粧儼如生倣佛步湖蓮神栁剝將枯獨有心中堅埀條自婀娜不受惡藤纒年年臘雪後葉綻翠眉鮮鄉人枌榆社日有牛羊牽惟聞繂縩響紙􅏛撒金錢神往女巫下妙舞特蹁躚車旗颯靈雨簫鼓咽秋蟬祗愁神返駕不得此周旋焄蒿古時魂猶説草中鈿歸來不見嫂逺道正綿綿嫂面有糞土長淮終不湔分明小姑面留與後人傳米生性好古書字無半千至今纚牲石苔蘚滋蝸涎碑言天地間隂陽互推遷陽類况君子小人隂類偏五行有正位變化嵗功全云胡值龎雜交處荐成愆亂賊所稟性狐媚最便嬛潛如蟣與虱動乃百足蚿奄忽為魍魎鬼箭脫神弦赤手賣天下性命徒少延陽陽服兖黼班域在聖賢婦女尚知赧奈何欺八埏明雖未即察陰譴固昭然惟餘澤國女白骨寄荒阡姓名何必顯有此大義懸清風起懦夫未讓夷齊專爭欲楚人些斯囝日星宣我觀碑上字滿紙秋淪漣共薑賦柏舟名芳刪後編春秋偉宋姬身與火蛾煎後來有此碑砫石當奔川隔江望髙陲野水惟隼鳶憂來忽盈把寫此露筋篇待鶴二首松頂巢空罥兔絲相逢惟有白雲飛無心亦解尋孤鶴應怪傳書久不歸半夜苔階拾鸖翎憶渠飛去最關情柴門正對林梢月偏照歸程萬里明陪宋學士國子學夜坐次韻華堂環壁水微飇扇清燈蕩漾回瀾起窈窕佳月生迹陪簮筆彥心諧超世情露繁愜栖翮林暗爽流螢眷兹悟物性諒匪繫王程宵中已忘寐顧影素娥升齊桓公召陵初服荆首止復寧周瓜瓞既云茂楚氛亦奚憂偉哉一匡功首盟至葵丘胡為曾西子興言貽彼羞宣王有遺烈江漢至今流舍彼僣王罪世逺及膠舟孝子貴幾諫忠臣納嘉猷羽翼制君父嗟兹乃詭謀圖伯巳如此震矜何足尤春秋不獲巳世降日滔滔將無彼善者桓公誰與侔送季思文教諭考藝還東陽素著處士服今冠博士冠縣官親勸駕接武青雲端慷慨赴闕下長揖見天官胸中有武庫光怪森可觀寫作一卷書字字騫祥魁名壓衆士金華􅔡巑岏天官列姓氏謂可貢金鑾君聞再三辭恬退人所難縉紳有如此誰復誚儒酸我時與之逰握手露肺肝振衣石城下六月大江寒一飲江中水古心爛銀盤載弔鳯皇址稍寬秦淮湍次第覽形勝龍虎相踞蟠忽得縣官書殷勤問平安且言兩月來諸生候歸鞍教席久虛倚蕭條塵滿簟䫁君早旋斾旅邸重加餐咿咿讀書竟翛然臂生翰翻身别我去修途出層巒到縣及新爽秋雨槐花殘父老見君拜相見有餘歡從兹少徭役黎首肌膚完子弟各飽食書聲喧夜闌人才日如林時清冠自彈臨岐慘將别且復立江干胥會良有期歎息贈猗蘭秋林髙士圖嵐峯半殘陽彩翠明林杪僧塢逺鐘微歸人下山少風杉落鼓響驚起栖煙鳥携手顧言還前村月初皎神絃曲四首織女廟君西楚霸王廟伏虎神廟滬瀆龍王廟紅蓮小朵金塘秋水上弓鞋新月鈎碧日無光靈鵲死文星墜地銀雲起隂鼓森寒聞唾壺神衣繂縩機聲裡曲曲湖波艷神眼十八虛鬟神自綰寶奩掩月裊蛛絲天促神歸神不歸黃屋龍顔死灰色寶鼎嘈嘈人血碧漢鬼入雲成辟歷轟破當年霸王魄漢家日月上天飛照見廟前神樹枝萬騎隂兵去如水酒痕灑殿酣春蟻風過隂廊聞墮珥毾㲪舞罷虞姬死􅕣􅕣天鼓秋湖裏雪山耀日青山紫金鎖蛇鱗百尺身領得江中萬魚起女巫酹乳飲龍孫雨蕊芙蓉瀉秋水神絃棖棖風雨黃明珠一夜照龍堂三江水渾龍濯足明朝化作林中緑金錢紙撒掀空舞羣巫啾啾答神語旋風下山百面鼓神馬如人馱一虎豹作兒啼隨鬼母纈裙嬌女出神帷拔得虎鬚留畫眉妖歌自飲髑髏巵蠻夫拜神求虎血洗箭入山求虎穴家家望見觚稜月一路神燈亂如雪癸酉嵗徐樞密第賞雪雄雞日落鳴嘐嘐天形咫尺懸如匏黑風不作黃雲交將軍宴客具行庖酒飲馬湩駝峯肴燕姬珠帽翠埀髾色壓秦娥河濟嬌十四冰絃雜雅咬白翎鵲起聲嗃嗃鼓簧間以筊與􅩁居客之右我拔茅不持寸鐵勢炮烋真官是時羣走㺜煎海簸弄相譏嘲靈雨一霎吹旗旓墮地不濕俯可抄六出吐葩坤有爻天與為巧誰裁綃萬家機杼織老蛟五彩絢爛嫌混淆一色擬覆天地凹繽紛迭舞鳯九苞回旋欲尋阿閣巢左左右右尾相捎噤彼百鳥喧啾啁何有多聲春鶻鵃砉然撇去攉然拋振髭萬騎俱鳴鞘空中擊毬衆呶呶須臾羣飛食稼蝥撲􅉡繡户千蠨蛸黃蘆劃然間雙哮颯瑟馬廄銼茤茭亂點水面倐而消清淪見底非投膠驚鳬嘎嘎或唆唆吳西諸峰聚呌庨頭角一變冰潭蛟千樹玄圃迷林坳暘春爭先羯鼓敲我懷魁壘異斗筲屢奮屢蹶志不撓拔劍起舞風飈飈昔聞真龍卧朔郊太師在旁如老虓隂山狐狢僵莫跑手搴氊帷復其殽功成四海親同胞鴻基不阻東西崤生物豈擇地肥磽養不率化獠與貓性則貪狼心惛怓撅食凍鼠甘如麃織罽編蓬為闕嚆跳踉溪谷嘻呵勦將軍忠孝天所教幢節翳雉纛樹氂生死管樂闕尸狡詎有犀首敢嘵嘵三千健兒面䫜顤有力超乘捷登轈馳生馬駒刷且刨角弓在韔寒裂弰黃牛熾火帳中炮行將平蔡歸奏鐃勤王不獨貢厥包我詩排戰虎旅哮小敵簸口大敵䜈呵筆作字硬語聱角聲凍咽梅花梢題張夔畫閩山曉行障子男兒少年逰泰華蹩躄逰閩殊未暇千峯鬭醜七州偏荷爾移將挂吳下惡風埋嵐蟒蛟舞熱水出雲龍即化就中虛落頗姿妍榕葉深春荔枝夏莆田張夔老畫手矍鑠燕都驢獨􅘳白首南歸作冷官爛醉何曾官長罵酒醒拈筆掃東絹障裡林巒風起麝行人渡口雜疏星車馬營營烏啞啞憶昨巒村太平日外户俱開天自夜俯仰兵塵十載前聊假丹青繪官舍陳郎慷慨夔所知持此還傾槖金謝遂令千載想同時彛也題詩夔也畫徐雨山寄蓮花秋風吹皺銀塘水小雨芙蓉不勝洗誰揀新紅折得來不怕緑芒傷玉指煙絲有恨自悠揚相惹相牽短復長雙頭並作幽修語一夜露痕黃粉香我有銀瓶秋水滿君心不似蓮心短緑房結子為君收種向明年應未晚題李太白像青天無人代天語一星西落銀雲渚嫦娥戲弄青瑶波傾向人間金叵羅龍孫醉吸海為酒日月雙飛織錦梭仙鬼千年王母宴謫來醉卧金鑾殿玉環腮上桃花小玉尖香膩龍涎硯靴塵暖撲貂璫兒踏破青天捉月飛一聲呌斷扶桑雞海枯化作蓬萊雪夢裡長庚大如月鄞江漁者歌贈陳仲謙我昔采藥華山峯羣山一視青童童或從暮靄見一線知是鄞江源甬東婁東今見披裘者浮江昔在鄞江中釣竿每裁鄖山竹臺笠獨染蓬萊松向人只説鄞江好似有江水蟠胸中鄞江山水帶甌越晝夜海日㴠虛空青天時截螮蝀雨白波或起鯉魚風潭雲不礙山水色百里尚見漁人蹤陽灮坐弄春蕩楫灘響卧聽秋推篷朝炊前村記煙樹暮搒别浦依丹楓扁舟所至聊復爾飲水即如春酒濃平生姓字人罕識一自為漁今老翁故山年來暗烽火苦雪嵗晏愁空蒙尋源未向武陵去放舟尚喜滄溟通賣魚偶入練圻市得錢買米真珠紅猶惜黃塵滿城郭秋風濯足來吳淞眼明目送獨歸鳥意盡忽見雙飛鴻夕陽晒網不知處有夢數與鄉人逢朅來相見不相識一笑知我遭文窮我本青城采樵者孤吟豈是寒窗蛩懷中亦有太平策不救午甑飛春蟲明朝擬入五湖裏且載茶灶尋龜蒙君今出此鄞江畫許我結網來相從殷勤索詩饋雙鯉我欲放之疑是龍丹山赤水定何處只今吟笑何人同碩君著我卧船尾霜晨共聽育王鐘已酉練圻寓舍詠雪青龍已酉豐稔叶嵗星一終旬日浹天容黃黃風􅟫􅟫雲同八表不見葉漏促辰酉日車跲目眩空花氣屢懾凍指欲墮數蓂莢股栗匪由冰上踏半醉酒暈不上頰腰收帶圍項收夾褰帷霰落霑在睫前驅一瞥後數霎倏焉萬片積幾疊凝而復消何萎薾欲破未破聊自接樹惹騷騷苔靨靨裁以天孫剪宫妾金刀兩股十一捻六出點綴同一帖空中招搖亂秋葉作塵下來滚狂蝶相逐復上意似愜南箕簸之鞠吹挾斜斜整整飛跕跕襜如左右轉腰衱凌波有女還余褋塔鈴無聲燈劫劫縮首就枕夢或魘忽聞萬馬來蹀躞蒹葭水中羣雁喋潭魚撥刺跳莕菨秋蟹入籪相凌躐黠鼠時時嚙空篋落葉霜乾步雙屧吳蠺上箔兒女祫喧囂衆口中有諜愁如附耳語談囁枕邊傾聽殊未厭開門驟見灮明㲲布之六合坦可躡百谷俱堙阱俱敜吳東縣山固黟歙海峯半露青螺崨荒城蜿蜒迷雉堞萬屋魚鱗龍振鬛千花復吐春燁燁栁髮毿􅀈倩人躡有懷欲泛溪上艓壓重枯篷難進楫幅巾褁頭寒未怯躍然􅘳驢衣自攝家童凌兢背負笈憶昔少年曾任俠身輕欲飛衣袴褶曉起衝寒行且獵強箭如雨脫韝韘劍頭狐兔肉為䐑且炙且啖不用挾槖傾馬湩盟共歃困路年來謾彈鋏今朝凍冷吟自怯拍塞秀句填兩脅平岡宿草生瑞箑蝗出縣境無剽劫明年有秋徵往牒萬夫耕種齊下鍤婦子嘻嘻共春饁暖覺烏靴凍痕絶裁詩突兀陋大業白戰今年秋獻捷瀟湘八鴈蘆根寒晚雁唼喋沙觜無人星􅀢靨聞有數聲何處來相呼忽動風中葉雙飛不復過衡陽翎間猶帶橘州霜歸來影落碧莎冷愁山一夜攢瀟湘夢裡湘天初積雪白溝河上琵琶咽猶見當年舊節旄幾回拂向穹廬月偶題二首旅舍多歸夢今歸夢始真孤城五更雨百死一全身短日同慈母浮雲是故人欲辭城郭去漁釣老江津城破生還日依人八口存虱添慈母線燕絶主人門巷葉霜埀屋園蔬雨隔村身經亂離苦聊與野翁論送安南使還國應制帝德如天四海同卉裳相率向華風稱藩特奉龍函表偃武仍包虎韔弓貢自炎方歸域內心先流水到江東路經日出知天大城與山蟠見地雄詔語陪臣趨玉陛班隨仙仗列彤宫陳情委曲為蠻語賜對從容徹聖聰駝鈕新頒王印重蟻觴屢飲尚樽空承恩共識皇華使命將毋勞矍鑠翁已擬再將周白雉底須復表漢年銅五絃曲奏鯨濤息重譯人還鳥道通薏苡生仁供旅食榔埀葉蔭詩筒部迎定見新闕騎驛送猶思上國鴻歌舞萬年當率化扶携百越共攄忠大明燭物今無外從此皆如禹甸中東歸有感路斷江淮已足憂繁華猶自説蘇州萬人金甲城頭騎十丈朱旗郡裡樓麋鹿昔逰何處草雁鴻不似去年秋忍將一掬東歸淚付與婁江入海流憶徐生侯門復有小將軍腰佩金符却好文記得今秋嘗藥處只餘朱户掩吳雲王常宗集卷四
