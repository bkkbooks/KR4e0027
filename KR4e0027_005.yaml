body:
  text: 王常宗集補遺明王彛撰大學章句序説大學本漢儒戴聖所編禮記中之一篇程夫子見此篇與中庸非聖賢不能作而俱隱禮記中始取以配論語孟子而為四書朱夫子俱為作章句凡若干言題之曰章句者分章晰句以發明之也不曰集注以擬諸論孟者古注外諸儒未偹言也于二篇獨為之序者總言其所以述作之大旨也此序白雲許先生以為當分作三大節看而每節又分兩假自篇首至非後世所能及為第一節所由設也以上其前假也三代之隆以下其後假也自及周之衰至壞亂極矣為第二節而知者鮮矣以上其前假也自是以來以下其後假也自天運循環至篇終為第三節復明于世以上其前假也某之不敏以下其後假也彛竊謂第一節言聖人得其位而大學之教行于天下天下既共由乎此故前假言闡教者之猶有人立教之道有其原後假言設教之德極其偹第二節言聖人不得位而大學之書始傳于後世後世乃反亂乎此故前假言闡教者之猶有書後假言􅊣教者之不知書第一節言大賢得其傳而大學之書復顯于天下私淑者當自任以此故前假言遺書之託為有人後假言補書之責當在已也彛之先君子曰此序法孟子一治一亂章而作蓋大學之教明晦而治亂分焉繼天立極其法寖偹皇帝王之一治也教化陵夷風俗頺敗周衰之一亂也若吾夫子及曽孟二子作而又一治異端俗儒衆流起而又一亂至程朱夫子出而又復一治孟子固曰我欲承三聖吾朱夫子于此而有不得而辭責矣林隱程氏曰序意始終推言治教學三字蓋大學之道君以此治之師以此教之王公庶人之子弟于此學之此聖學之興廢王道之隆替皆視此何如爾送仲謙師序比余以纂修元史得聞元之造邦其國族多雄豪而惟儒臣之經綸是賴至于佛老氏若丘處機及帕克斯巴者亦咸有功焉則凡其徒為之言又烏可巳哉此釋老傳所以作也雖然于此可以觀世道矣初八合巴思之有功于元室也世祖為錫號帝師而位之一人之上俾其後世襲之方是北而冰天南而桂海日􅀈月竁之東西凡為釋教者莫不宗焉而其塔廟土田被覆天下視王公萬姓之産恆十七八富貴聲容足以震耀一世人則回視夫前數十年時一大夢也余嘗聞佛之説往往夢視一世其于世之所有者皆歸之浮雲空華而弗之顧然而富貴聲容之震耀者乃如彼固佛之所樂為乎仲謙師為佛之説者也獨能脫略世纍而皆委諸空言以為詩于是主佛祠于上海之楊林而輒謝去將西還吳江以卒業其佛之説其友哲彥文求余為之言以送之師固不以其勢之興衰而為鋭鈍也故誦其所感者焉送堅師序孔子門人若求之藝賜之言語遊與夏之文學顯然在七十子上至于回也不遷怒不二過屢空而不改其樂則不必其有文學言語而求賜之徒有弗能及者佛氏自達摩言心而來文字言語皆無足道乃或自欺以顔子之樂然顔子之樂與佛氏之所云者雖未知其果同異者而儒者與佛氏逰如韓子之于文暢令縱歐陽子之于惠勤蓋皆取其文辭而巳焉豈以其心學之殊而文辭之同歟或他有説也堅師佛氏也以文辭逰吾儒中至是主松江佘山之普照寺儒先生皆相率而贈以歌詩而陳留阮維則求余為文以序其卷首嗟夫吾儒與佛氏所尚者初未嘗以文辭而已也然而不以為不足為而為之者韓歐二子與暢勤之徒夫既樂而為之矣雖然暢勤之徒以韓歐故傳而韓歐乃又惟取其文辭而巳也然則吾與師以文辭相與者蓋亦有所本也已中秋玩月詩序燭天地而至清者莫如月故玩于秋宜也秋之中尤宜也至正草六年八月甲子望鄉人周景延冀人馮季濓洎余會蜀人王某疁城之居均臭味也即携楮筆造登龍觀之南樓以修玩事觀之主道士鍾希聲與其客天台僧默肅以手啓窗布席而坐四空不雲涼月鮮澄神情欲飛境意俱勝因掇曺孟德月明星稀語分韻賦古詩體以紀焉時稍渴需茗默戲曰詩先成者茗之某詩先成且吟且啜若譏我三人者次季濓成次景延與余成始得茗莫不絶倒由是慿欄髙詠琅然聲紆徐瀏亮下震闤闠間還者出歌者息閴然而聽之景延曰雅之遏鄭音如此哉衆樂甚思逾溢且方二鼓鍾設酒果以歡復以前孟德語為韻各賦四絶句惟季濓卧思竟睡去既覺東方作矣即走筆而就夫中秋也氣以澄寒燠以均月之色也倍故古之人得玩為喜不得玩為恨方今枹鼓天下莫之或寧而吾數人乃能以良辰無事逍遙于斯樓詎不大幸矣乎景延并季濓以事出非偶不可無敘因授簡焉余固辭復余屬弗得辭故述以略時從筆硯者許生鎔張生翀也送朱道山還京師序上以聰明神聖肇王業十年之間海內僣亂以次平一既而海外諸國亦每梯航而來貢夫明王之化逺被百蠻固有至神而莫測者然亦有其故焉朱君道山泉州人也以寶貨往來海上務有信義故凡海內外之為啇者皆推焉以為師時兩浙既臣附道山首率羣商入貢于朝上嘉納道山之能為逺人先俾居輦轂之下優遊詠歌以依日月末光示所以懷柔逺人之道海外聞之皆知道山入貢之榮有如是也至是海舶集于龍河而逺人之來得以望都城而瞻宫闕且人見中國衣冠禮樂之盛而相與詠歌之者又不啻道山入貢之榮也夫以道山之能為逺人先也不在于他時而在于今日蓋聖上有作必有一代之人物以共事于此而道山亦與有榮于其間焉非偶然也適道山自京來婁江者數月矣將還其親友田勝祖孫文富陳寶生咸徵贈言于余余故喜逺人之方來而未已也兹用表而出之以為向化者之勸望山堂記上饒衣冠之族世多推薛氏由唐以來居貴溪之漸步里至于今若干世矣有白屋先生者名某字茂以清文卓行為時名儒朝之名卿大夫文章若虞文靖公忠義若余忠宣公皆樂與先生相遊從而先生之風又自有邈乎其不可及者其所居在白屋山中有望山之堂焉蓋先生之七世祖富川府君為樓曰梯雲六世祖上舍君又為堂曰碧山至髙大考金溪君曾大考山長君或扁樓天碧或自號山雲以寓其碧山梯雲之趣而復有所謂碧雲軒則其大考碧雲君之所居所謂一雲一碧則其考闕府君扁其東西之室蓋皆以寓其山雲天碧之趣也至先生而曰望山者望山而天雲之碧固巳在于其中于是祖子孫六七世之流風道德蓋亦可以想見矣先生故屬彛為文以併記之彛嘗讀詩蓼莪而見所謂矣夫罔極云者固悲夫仁人孝子之心所以思其先人者與天同無窮也今夫人之有其身于天地之間者果何來邪吾之身蓋有其父矣有其祖矣有其祖之祖矣而皆不可以復作矣乃慨然而求其音容無有也其心當何如哉先生以一望之頃而求其祖父之音容焉則惟見夫漸步之山灮天影浮雲往來有天地果如是也今其巖巖而髙者其儀形之可象者乎蜿蜿而升者其容止之可觀者乎蒼蒼而莫可紀極者其聰明薰蒿之猶存者乎是固有不能不思焉者而其心蓋無窮也雖然山無窮也雲無窮也吾心之思其得與之無窮也邪然而先生之心天地之心也前乎千百世之既往後乎千百世之將來如一日也固亦以無窮之思而與之無窮矣乎彛也遭家多難蓋亦有無窮之思焉知先生之心果無窮也故不辭而為之記若薛氏之孝義先達之製作偹矣兹不著送殷教諭赴咸陽縣序國制凡府州縣必皆有學學必有官官必以府州縣所薦士然猶必考驗于吏部乃歸而就職焉殷君孝伯崑山人也以古學倡其鄉邦為士人所推服大夫聞之因薦以為縣學教諭君以母老辭強起之既上吏部試春秋義及道統論各一通執政者見之嘉其學欲薦以為守令君辭曰某迂儒職教可也民社之寄重矣然非才不可也既而朝廷以學官準常選例亦南北互調遂調君咸陽縣學教諭咸陽去崑山數千里而逺君還治行李鄉之人皆惜其官之卑而行之艱也而或歔欷以泣然則余嘗有所望于君者而不在是也乃推君所論道統之意以解之曰聖人之道與天地之化同流也堯舜禹湯文王固各有地矣湯以後文王周公興于歧周又五百年而孔子作于魯又百年而孟子起於鄒又千數百年而周子程子生于楚張子復生于歧下而會于伊洛之間未幾而朱子出于閩焉夷考其地則歧周西北也魯與鄒東也伊洛中土也楚其西南而閩又極南也而天皆生其人焉其由西北而東者相去幾五百年其由東而來在西北在西南在極南者相去又千數百年顧乃希濶若是然而在西北與其南東者先後雖五百餘年而同代數人其在東南百年而有兩人在西北者二千年後同地而復有其人又其自東來千數百年後在西北在西南而會于中土者同時復有數人而其在極南者其人又相續也夫天者之為是也豈無其故哉蓋世運至于周上之而唐虞焉下之而秦漢焉此升降之會也而文王周公孔子孟子乃先後見其一代之間豈非天以道統重周也故地不偏王而其人或王于西或素王于東以大是一統歟至有宋而周程張子皆出千數百年來鬱積之久而闡發之盛豈非天以宋之有道也而其人生于西北生于西南而會于中土又以大是一統歟宋之南也趙氏微完顔盛朱子之生不於北而于南豈非天以其一人而存天下之道統歟然則聖人之道沛然在天地間由西東北南而假之以其人發之以其地而不囿于一方者天固使之然也今天子以中國之聖統海內外而學官設焉因命南之士典教于北北之士施教於南所以一道德而同風俗也余於是蓋竊思焉自昔元有中國而許文正公以朱子之學佐其主自是南北學者咸知有朱子而朝廷亦以朱子説取士然北方學者於朱子之微言精義猶未若江南君子知之為深蓋朱子之學授之黃文肅公文肅傳之文定何先生文定傳之文憲王先生文安金先生皆南産也文安當元世猶存顧乃窮而在下其言雖立而未能逺被于斯世若猶有所待者固有在于今中國一家之日歟君生南方知朱子之傳為有在今而之咸陽焉則文王周公聲教本原之地而張子所過也北方學者有能或之先後者焉君其必相與考德問業以要其指歸則于國家所以一道德而同風俗者非小補也吾聞京兆有蕭維斗先生關中之學者宗焉今亦有為其學者乎比余與修元史獲次其言行置之儒學傳中君而得其學者試以余言而語之其亦有以教我哉洪武四年九月一日蜀郡王彛常宗序錢堂師畫像贊其形􅋯其神腴雖剃髮者儒佛則俱其眉龎其氣昌是觀心者形影則忘故索其迹雖若出乎儒佛之間而泝其道乃獨超乎形器之先然則若師者是殆猶錢塘之勤而潮州之顛者歟題讀書樓仲尼雄斷似唐虞鄴架徒誇萬卷餘三代以來方有學六經之外更無書藝窗夜靜螢流火竹簡年深蠧化魚果有一言人可法文章寧用似相如王常宗集補遺
