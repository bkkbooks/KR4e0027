body:
  text: 王常宗集續補遺明王彛撰獅子林記并詩蘇城之東北區有林若干畞佛者居之曰獅子獅子者林之一峯如其形故名而其地特隆然以起為丘焉雜植竹樹丘之北窪然以下為谷焉皆植竹多至數十萬本始升其丘之南麓便仰見獅子峰髙仞有若千尺如舞且踞兩傍復各有峯亞匹之東曰含暉作人立左腋下有穴一腹枵然有四穴日始出則其暉晻曖相射西曰吐月頗峭且銳稍夕月即見其上獅之北有室一曰禪窩含暉之東有隙地踰尋砌以石子為環坐者所藉曰繙經臺傍有峰特出曰立玉然其狀嵌空若刀劍劃作四五葉者或曰以地肺名為宜吐月之西有澗自竹谷中來因架石為梁曰飛虹踰飛虹以西而下其西麓乃北入竹谷中委蛇東來折以南出玉立後而上其東麓復折而南且西出獅子前而下其南麓凡丘之顛踵自三四峯外諸小峯凡十數計且叢列怪石什百為羣而所取道往往經緯其間既下南麓有二道其循麓而西者至問梅閣問梅與指柏相值梅與柏各一皆相結為蛟虬其夀㡬二百年柏之南有池曰玉鑑若鑑影以自媚者梅之西有井曰冰壺初鑿井時得古壺尊地下而其泉冽且甘以瀹茗味尤勝云余在昔扵斯逰也盖屡焉而不厭今年秋復與茅宅民陳彦亷張㬅端來逰而因師者余故人也止余宿問梅閣得詠歌其丘與谷者累日師曰是果可以詠歌歟願有記也故書之石而使刻之先是有十二詠書石上其倡者髙太史季迪和者張水部子宜王文學止仲謝翰林𤣥懿今亦為同逰者洪武五年秋七月稽岳王彛記獅子峯昔年清涼山燄燄金毛赤來此自何年蒼然化為石含暉峰鑿翠從陽谷移來佛屋東空嵌纔一竇夜與日華通吐月峯勢作金蟇立呀然仰太清每當三五夕先放半規明立玉峰昆岡分半股挿地四無鄰為有懷中璧虹光夜夜春禪窩古屋依青潤袈裟半是苔壁間僧影在一坐九年來繙經臺雲麓㝡髙層依依月乍升聊因看貝葉帶露一來登小飛虹龍影夕連蜷不飲吴江渚截斷澗東天飛來澗西雨竹谷㡬曲轉逶迤月明人跡稀長林秋露落一犬吠山扉立雪堂大地寒深處叅師不自知青天還日出一路見來時卧雲室秋潭看月還片雨千山暝獨有鉢中龍蜿蜒伴僧定指柏軒行道出深􅀢空庭秋颯然風來人不見青子落僧前問梅閣窓間月色微薄雪自風吹誰得春消息南枝定北枝玉鑑池水清不生萍况復生魚子僧面此中看分明佛光裏冰壺井銅瓶百尺下出甃帶微霜注入蓮筒去風吹滿寺香余既為因師作逰獅子林記師復求十四詠因賦此并書記後師字如海髙昌人有禪學又能喜文辭所謂地因人而勝者也甲寅六月二日彛書癸丑嵗十二月初四夜宿獅子林聽雨有作自是城中寺却忘身在城俄然萬松子吹作四簷聲我欲逺塵世僧多㽞客情聊因佛燈下聽雨到天明為如海上人題頋定之竹老僧出定心逾寂坐覺谷中繁露滴萬響千聲自去來一時月照袈裟白蜿蜒何物向窓飛分明鼓鬛復揚鬐人間只識仙翁杖不識降龍出鉢時泉州兩義士傳孫天富陳寳生者皆泉州人也天富為人外沈毅而含𢎞寳生性更明秀然皆勇扵為義初寳生幼孤天富與之約為兄弟乃共出貨泉謀為賈海外天富曰爾母一子惟爾吾不忍爾逺爾母涉海往異域吾其代子行哉寳生曰吾母即若母也吾即逺吾母惟君以為母吾行又何憂焉扵是兩人相讓乃更相去㽞或稍相輔以往至十年百貨既集猶不稽其子本兩人亦彼此不私有一錢其所涉異國自髙句驪外若闍婆羅斛與凡東西諸夷去中國亡慮數十萬里其人父子君臣男女衣裳飲食居止嗜好之物各有其俗與中國殊方是時中國無事干戈包武庫中禮樂之化煥如也諸國之來王者且颿蔽海上而未巳中國之至彼者如東西家然然以商賈往不過與之交利而􅔡貨兩人者雖亦務商賈異國人見此兩人者為人有特異也自王化被海外且及百年中國之人至彼如此兩人者亦不多也此兩人者迺身往其地而親其人使其人皆見而信之有切扵所傳聞者兩人異姓也長為兄少為弟如同氣然異國人曰彼兄若弟非同胞者吾同胞宜何如寳生至言其母事則泣天富亦母事寳生母每慷慨為諸國人言其事輙欷歔乃巳異國人曰我與彼皆人也人誰無父母夫婦子孫者兩人客萬里裔夷􅏒必服中國禮俗言必稱二帝三王周公孔子又能道今國家聖徳神功文章禮樂與凡天下之人材異國扵是益信吾中國聖王之道海内外可共行也異國有號此兩人者譯之者曰泉州兩義士也中國之賢士大夫聞之亦皆以為然云天富字惟善寳生字彦亷今居吴之太倉方以周窮援難為務寳生母事别有陳節婦傳媯蜼子曰余讀周書王㑹篇夷之國衆矣而皆納貢周邦孔子周人也欲居九夷然未往也今孫陳氏以商賈往且猶􅏒乎彼豈其讀聖王書慕義而行之不然何其居夷而能是也古語曰放之東海而準余於孫陳見之矣至正二十五年八月蜀郡王彞生製周景安秀野軒朱德潤書古苔十畆青山麓窈窕幽花暎深竹中有髙人晝掩扉裊裊藤梢上書屋清風出谷洒秋香返照穿林破春緑不省睢陽畵裡看細路經丘杖藜熟春草詞陳母莊蚤寡以貞節著聞其子寳生字彦廉能養甞作堂奉母且自謂父母恩無窮而難報因取孟貞曜㳺子詩語扁其堂曰春草髙太史季廸既著為記余復作春草詞使歌以夀母盖欲子之心與母恩同無窮也其辭曰春草兮青青羅生兮滿庭望王孫兮不歸紛百草兮愁人叶如之翻結幽蘭兮佩之采莫采兮江蘺東風發兮江渚晞朝暾兮以雨蓀亦樂兮有母叶滿補翻日承顔兮堂下叶後五翻把瑤華兮瓊英叶扵良翻日方永兮嵗未央羌進拜兮羞余觴春欣欣兮百草生叶傅王翻草生兮有心叶思容翻春復春兮焉窮春草堂詩㡬見春風吹草青一身偏自念初生從今白髪應重緑嵗嵗春來母子情䟦張貞居自書帖歴代史臣不為釋老立傳或老氏有可書者則以置之方技傳中至皇明脩元史始别有釋老傳之目而老氏首丘處機釋氏首八思馬且各有數人焉張雨生東南以工書善詩為道流一時學士大夫若趙文敏虞文靖黄文獻諸公多與之逰乃不得入傳或者疑之然處機八思馬之徒在其太祖世祖時大抵皆以功業顯故釋老氏有傅盖不徒以其法而然者則夫雨之可傳正不在此余甞執筆從史官得預是議今觀雨自書雜詩扵温陵陳寳生家詞翰之妙如是自當與趙虞諸公詩集並傳也洪武壬子秋八月稽岳王彛識䟦張旭春草帖右唐張旭春草帖有宋名臣題識其一微仲觀於東府之東齋在元祐壬申其一師朴觀於樞府之前㕔其一器之觀於承旨㕔之東軒皆在元祐癸酉其餘乃紹聖宣和靖康時人盖壬申癸酉間呂公為左相韓公為樞宻劉公為樞宻都承旨一時君子在朝共成元祐之治自此歳後即非復元祐矣扵是為紹聖為宣和靖康而宋運中圮此帖遂隨南渡入張循王家故有臣俊等印然則一紙之顯晦與宋之治亂相仍歟披玩之餘不勝嘆息時洪武壬子之秋稽岳王彛識王常宗集續補遺
