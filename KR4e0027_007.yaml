body:
  text: 王常宗集後跋杲童幼稔聞長老論及嘉定鄉先生學行純正文章典雅必王先生常宗為稱首自恨生晚不獲一撡杖屨以偹牛馬之走間嘗得其詩文一編曰三近齊稿其議論根據精彩發越反覆誦詠使人有手舞足蹈之意此杲所為恨生晚不得以從問道執業之末然是時抱生晚之恨者豈獨杲也吾友劉君子珍過而見之默然有契于中乃曰君貯之篋笥以私一人之觀覽孰若鏤板以傳庶斯文之不墜而先生之名亦得以埀不朽也遂許捐金以成厥美其間多有陶隂亥豕等字復求進士都公𤣥敬校讐㸃撿略無茍且復為序文以辨首簡杲惟先生出處大節具見髙太史王半軒所為堂記豈杲後學謏聞淺識之所敢識然在當時師友文物之盛若金公德儒張公翰宸趙公元鼎袁公德新諸老芳名偉烈百嵗之下後生小子終莫得聞幸存先生之文而著若今茍無子珍之好義亦同歸于泯滅而已爾夫逹者之用財不為妄費無益之事世俗惟知􅗲身後之福與夫淫侈聲樂之類雖費巨萬在所不恤其于義事則拔一毛而利不為也古人有云曠百世而相感得此心之同然其子珍謂矣𢎞治壬戌春正月望邑人後學浦杲敬識或問長生之道余應之曰上則聖次則賢或曰古稱夀聖賢曾不留至今何謂長生余曰聖賢雖不存其所亡者形也形而下者也所不亡者心之理也形而上者也今心雖不存而心吐之言千古常新安在其為亡也吾練川有媯蜼子先生者姓王名彛字常宗其學之傳出於仁山金氏故淵源有自發為詩文皆平順和暢根于至理國初以布衣召修元史書成受金幣之錫有以薦于翰林者先生以母乞歸後竟不得其死嗚呼先生之才之德而不得其死今乏曾𤣥以衍其後使其文不傳不為真死也歟余因採訪其文集數卷出資繡梓以廣其傳刻成因綴數語于後以見先生雖亡而所以不亡者自若也𢎞治十五年春三月朔同邑後學劉廷璋謹書
