body:
  text: 王常宗集别集類五明提要臣等謹案王常宗集四巻補遺一巻續補遺一巻明王彛撰彛字常宗其先蜀人本姓陳氏父仕元為崑山教授遂遷嘉定洪武初以布衣召修元史賜金幣遣還尋遷入翰林以母老乞歸飬自號媯蜼子後以魏觀上梁文事與髙啟併誅明史文苑傳附載趙壎傳中其集本名三近齋稿宏治中都穆編為文三巻詩一巻劉廷璋浦杲又輯補遺一巻今世所傳鈔本又有續補遺一巻不知何人所輯考其體格與全集相類似非贋作也王士禎香祖筆記曰王徴士集都少卿元敬編元敬稱其古文明暢英發又或以為呉中四傑之一以常宗代張來儀者今觀其詩歌行擬李賀温庭筠墮入惡道餘體亦不䏻佳安䏻與髙楊相頡頑乎云云案彛之學出天台孟夢恂夢恂之學出婺州金履祥本真徳秀文章正宗之派故持論過嚴或激而至於已甚集中文妖一篇為楊維禎而作者曰天下所謂妖者狐而已矣俄而為女婦而世之男子惑焉則見其黛緑朱白柔曼傾衍之容無乎不至雖然以為人也則非人以為婦女也則非婦女而有空家之道焉此狐之所以妖也浙之西言文者必曰楊先生予觀其文以淫詞譎語裂仁義反名實濁亂先聖之道顧乃柔曼傾衍黛緑朱白奄然以自媚宜乎世之為男子者之惑之也云云其言矯枉過直而詬厲亦復傷雅雖石介作怪説以詆楊億不至於是士禎所云或亦有激而報之乎然其文大致淳謹詩亦尚不失風格雖不足以勝張羽必以為一無可取則又太過香祖筆記成於士禎晚年詆訶過厲時復有之固未可據為定論矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部六王常宗集目録别集類五明巻一碑銘蘇州重修孔子廟學碑鄉飲酒碑銘記蘇州府孔子廟南門記順理齋記秘藥巢記西野堂記瞻松亭記石磵書堂記抱𤣥齋記映雪軒記菊鄰記新陽農舍記櫟齋記服記清曠軒記蒙齋記巻二序蒲山牧唱序送沈亭伯之雲間序聚英圖序送李道士序送張容序贈李崇徳序送張侯詩序衍師文槀序送祖黙師序送浦士文序髙季迪詩集序送彭杞序美張彦和詩序送周衍覲省序送林毉正序送東傳師序送吉無咎序巻三說雜說說龜說彀印說惺惺說贊朱文公像贊貞觀納諫圖贊先公像贊陳寳生像贊雜著史約名目文妖鶴瓢志䟦淵明流水賦詩圖巻四雜詩露筋廟詩續王昭君詞陪宋學士國子學夜坐次韻齊桓公送季思文教諭秋林髙士圖神絃曲四首徐樞密第賞雪閩山曉行障子徐雨山寄蓮花題李太白像鄞江漁者歌已酉練圻寓舍詠雪瀟湘八鴈偶題二首送安南使還國應制東歸有感待鶴二首憶徐生補遺大學章句序說送仲謙師序送堅師序中秋翫月詩序送朱道山還京師序望山堂記送殷教諭赴咸陽序錢堂師盡像贊題讀書樓續補遺獅子林記并詩夜宿獅子林聽雨題頋定之竹泉州兩義士傳題秀野軒春草詞春草堂詩䟦張貞居自書帖䟦張旭春草帖王常宗集原序洪武史臣嘉定王先生常宗有遺文一編穆鄉嘗校定釐為四巻蔵之篋笥者二十年矣劉君子珍世居嘉定好古博雅謂是集為里中故物刻梓以傳而俾穆序之惟吴為東南文獻之地自漢唐以來名人魁士踵武相望至我朝洪武而益盛盖當是時脩元史者三十有二人皆極天下之選而出扵吴者髙季迪氏謝𤣥懿氏杜彦正氏傅則民氏而先生與焉先生之文精嚴縝密明暢英發不為諛辭浪語以逐世好要之根據乎六經出入乎諸子百氏而其識見之卓論議之妙求之當時已不多得而况遺之百數十年之逺其可以弗傳耶夫文者氣之靈秀天不能自言也故以之而畀於人人惟其君子也故得之而吐于辭世之小夫鄙生非無言也大率卑庸荒怪偏曲支離而不足取固無望扵文矣是知文者所以洩乎靈秀而鬼神之甚秘也獨不見夫古之人乎富貴福澤往往得之而能文之士代不數輩或其人流離痛憤阨窮饑凍而文辭始工此可以識造化之㣲矣先生少貧嘗讀書天台山中師事孟長文氏長文葢蘭谿金文安公弟子故先生之學逺有端緒若文則其所自得者為多而未嘗茍同扵人初㑹稽楊維禎以文雄一時吴越諸生多歸之者先生獨目為文妖作文詆之凡數百言穆於是又有以驗先生之學之正推是心也豈希寵盜名以徼一時之利者哉是以史成而歸身猶布衣而惟以讀書奉母為事嗚呼若先生者匪徒能言實允蹈之而足為鄉邦之重者也先生名彛其先蜀人父東軒公嘗教授崑山州學以卒嘉定崑山之接壤也故先生遂為嘉定人云都穆序
